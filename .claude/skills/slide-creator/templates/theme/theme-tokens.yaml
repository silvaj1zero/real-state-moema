version: 1
theme_profiles:
  - id: sinkra_observatory_dark
    pick_when:
      - Benchmark, observatory, technical strategy, or competitive intelligence deck.
    tokens:
      colors:
        background: "#050505"
        panel: "#111111"
        panel_alt: "#171717"
        text: "#F5F5EF"
        muted: "#9A9A92"
        border: "#2A2A2A"
        accent: "#D7FF3F"
        warning: "#F0B35A"
      typography:
        heading: "Inter Tight"
        body: "Inter"
        mono: "IBM Plex Mono"
      spacing:
        canvas: "16:9"
        margin_px: 48
        grid_columns: 12
      chart:
        grid: "#2A2A2A"
        neutral: "#777777"
        highlight: "#D7FF3F"
    constraints:
      no_gradient_orbs: true
      max_accent_area_percent: 18
      high_contrast_required: true
    absorbed_from: [presentation-ai, ppt-master, current_sinkra_bench]

