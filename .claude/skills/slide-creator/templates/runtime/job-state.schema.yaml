type: object
required:
  - job_id
  - run_id
  - job_type
  - status
  - inputs
  - task_records
  - progress_events
  - artifacts
  - policy
  - final_verdict
properties:
  job_id:
    type: string
  run_id:
    type: string
  job_type:
    type: string
    enum:
      - full_generation
      - source_document_generation
      - improve_existing_deck
      - prompt_to_edit
      - export_only
      - batch_generation
  mode:
    type: string
  status:
    type: string
    enum: [queued, running, waiting, completed, failed, cancelled, partial]
  inputs:
    type: object
  task_records:
    type: array
    items:
      type: object
      required: [task_id, type, status]
      properties:
        task_id:
          type: string
        type:
          type: string
        status:
          type: string
        started_at:
          type: string
        completed_at:
          type: string
        error:
          type: string
  progress_events:
    type: array
    items:
      type: object
      required: [event, task_id]
      properties:
        event:
          type: string
        task_id:
          type: string
        task_type:
          type: string
        progress:
          type: object
        message:
          type: string
  artifacts:
    type: array
    items:
      type: object
      required: [artifact_id, kind, path_or_url, status]
      properties:
        artifact_id:
          type: string
        kind:
          type: string
        path_or_url:
          type: string
        status:
          type: string
          enum: [planned, created, verified, failed]
        checksum:
          type: string
  export_policy:
    type: object
    properties:
      formats:
        type: array
        items:
          type: string
      editable_required:
        type: boolean
      verify_outputs:
        type: boolean
  policy:
    type: object
    required: [continue_on_error, timeout_sec]
    properties:
      continue_on_error:
        type: boolean
      timeout_sec:
        type: integer
      resume_allowed:
        type: boolean
      resume_from:
        type: string
  error_details:
    type: array
    items:
      type: object
  final_verdict:
    type: string
    enum: [pass, warn, fail, blocked]
