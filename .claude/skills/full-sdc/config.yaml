pack:
  name: full-sdc
  version: "1.0.0"
  description: "Full Story Development Cycle — orchestrates validate → develop → review (QG loop) → deploy → close via Agent Teams with sequential handoffs and visual task tracking."
  icon: "SDC"
  type: skill
  location: .claude/skills/full-sdc/

process:
  id: SP-FULL-SDC
  mode: ORQUESTRAR
  sinkra_version: "1.2"
  organism: ORG-SDC-001
  molecules: 5    # Validate, Develop, Review (QG loop), Deploy, Close
  atoms: 5        # po, executor, qg, deploy_agent, po-close (5 named agents)

artifact_contracts:
  - artifact_id: story-validated
    template_path: docs/stories/epic-{N}/STORY-*.md
    lifecycle_states: [draft, ready, in_progress, review, done]
  - artifact_id: qa-gate
    template_path: docs/qa/gates/{story-id}.yaml
    lifecycle_states: [generated, PASS, CONCERNS, FAIL, WAIVED]
  - artifact_id: deploy-verification
    template_path: docs/stories/epic-{N}/STORY-*.md#e2e_verification
    lifecycle_states: [captured, validated]

supported_modes: [ORQUESTRAR]
bu_mapping: hub-framework

token_count: 5
token_families: [Phase, Gate, Verdict, DeployType, Iteration]

knowledge_sources:
  - .claude/skills/validate-story-draft/SKILL.md
  - .claude/skills/develop-story/SKILL.md
  - .claude/skills/review-story/SKILL.md
  - .claude/skills/deploy-story/SKILL.md
  - .claude/skills/close-story/SKILL.md

invokes:
  - path: /validate-story-draft
    phase: P1
  - path: /develop-story
    phase: P2
  - path: /review-story
    phase: P3
  - path: /apply-qa-fixes
    phase: P3 (QG loop)
  - path: /deploy-story
    phase: P4 (conditional on deploy_type)
  - path: /verify-deploy
    phase: P4b
  - path: /close-story
    phase: P5

process_mapping: docs/stories/epic-*/STORY-*.md
