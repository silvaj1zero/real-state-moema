# Deploy Targets — Local Configuration (EXAMPLE)
#
# Copy this file to deploy-targets.local.yaml and fill with your environment values.
# deploy-targets.local.yaml is gitignored — never commit actual values.
#
# This file is the canonical schema for the deploy-story skill. The skill loads
# values from deploy-targets.local.yaml at runtime and substitutes them in the
# placeholders in deploy-targets.md.
#
# Security note: values below are examples/placeholders only. Replace with your
# actual infrastructure values and DO NOT commit the resulting .local.yaml.

hetzner_docker:
  gateway_ai:
    # Alias used in SSH configs
    server: "example-gateway-alias"

    # Public IP (usually blocked for direct SSH — documented for reference)
    hetzner_ip: "0.0.0.0 (port 22 blocked — do NOT use)"

    # Tailscale IP — primary access method
    tailscale_ip: "100.0.0.0"

    # SSH user on the server
    ssh_user: "root"

    # Absolute path to the app on the server
    app_path: "/home/example/app/"

    # Absolute path to the content store inside the app
    content_store: "/home/example/app/memory/content-store/"

    # systemd service name (without .service extension)
    service: "example-gateway"

  squad_engine:
    # Primary Hetzner server IP (no port — for Docker registry)
    server_ip: "0.0.0.0"

    # Private Docker registry endpoint
    registry: "0.0.0.0:5000"

  execution_engine:
    # Usually same as squad_engine.server_ip
    server_ip: "0.0.0.0"

    # Usually same as squad_engine.registry
    registry: "0.0.0.0:5000"

vercel:
  web:
    domain: "example-web.domain"
  acs:
    domain: "studio.example.domain"
  tikguard_web:
    domain: "tikguard.example.domain"

railway:
  api:
    domain: "api.example.domain"

# Additional metadata (optional)
metadata:
  last_updated: "2026-04-11"
  environment: "example"
  owner: "devops-squad"
