# Gap Analysis Matrix — Governance Pipeline
# Used by ATM-GP-012 to build the /roundtable --directive
# Defines what to compare across the artifact chain

comparisons:

  # ─── RT Decisions → ADR ────────────────────
  rt_to_adr:
    source: "roundtable report"
    target: "ADR document"
    checks:
      - id: "GAP-RT-ADR-001"
        check: "Every RT decision (D1..DN) has a corresponding ADR section"
        severity: HIGH
        auto_fixable: false

      - id: "GAP-RT-ADR-002"
        check: "No ADR section contradicts an RT decision"
        severity: CRITICAL
        auto_fixable: false

      - id: "GAP-RT-ADR-003"
        check: "RT conditions (K1..KN) are referenced in ADR constraints"
        severity: MEDIUM
        auto_fixable: true

  # ─── ADR → Epic ────────────────────────────
  adr_to_epic:
    source: "ADR document"
    target: "Epic file"
    checks:
      - id: "GAP-ADR-EPIC-001"
        check: "ADR scope fully covered by Epic stories"
        severity: HIGH
        auto_fixable: false

      - id: "GAP-ADR-EPIC-002"
        check: "Epic wave structure respects ADR priority ordering"
        severity: MEDIUM
        auto_fixable: true

      - id: "GAP-ADR-EPIC-003"
        check: "No Epic story contradicts ADR architectural decisions"
        severity: CRITICAL
        auto_fixable: false

  # ─── Epic → Stories ────────────────────────
  epic_to_stories:
    source: "Epic file"
    target: "Story files"
    checks:
      - id: "GAP-EPIC-STORY-001"
        check: "Every Epic story stub has a corresponding story file"
        severity: HIGH
        auto_fixable: false

      - id: "GAP-EPIC-STORY-002"
        check: "Story acceptance criteria trace back to ADR requirements"
        severity: MEDIUM
        auto_fixable: true

      - id: "GAP-EPIC-STORY-003"
        check: "Stories have executor and quality_gate assigned"
        severity: HIGH
        auto_fixable: false

      - id: "GAP-EPIC-STORY-004"
        check: "Story dependencies (depends_on) form valid DAG (no cycles)"
        severity: CRITICAL
        auto_fixable: false

  # ─── Stories → RT Conditions ───────────────
  stories_to_conditions:
    source: "Story files"
    target: "RT conditions (K-items)"
    checks:
      - id: "GAP-STORY-COND-001"
        check: "HIGH severity conditions have corresponding story ACs"
        severity: HIGH
        auto_fixable: false

      - id: "GAP-STORY-COND-002"
        check: "MEDIUM conditions at least referenced in story description"
        severity: LOW
        auto_fixable: true

severity_thresholds:
  CRITICAL: "Pipeline MUST halt — manual resolution required"
  HIGH: "Pipeline pauses at Human gate — user decides fix vs accept"
  MEDIUM: "Logged as warning — auto-accepted if TK-GP-003 <= MEDIUM"
  LOW: "Logged only — no action required"
