# Governance Pipeline — Skill Configuration
# SINKRA-compliant config following handoff/roundtable/wave-execute pattern

skill:
  id: governance-pipeline
  version: "1.0.0"
  owner_squad: sinkra-squad
  sinkra_tier: Enterprise
  bu_mapping: "hub-framework"
  sinkra_ref: "ORG-GP-001"

  supported_modes: [PLANEJAR, VALIDAR, GERENCIAR]

  artifact_contracts:
    - artifact_id: "consolidation-artifact"
      template_path: "templates/consolidation-artifact-tmpl.yaml"
      lifecycle_states: [draft, validated, consumed]
    - artifact_id: "pipeline-report"
      template_path: "templates/pipeline-report-tmpl.md"
      lifecycle_states: [draft, approved, stale, archived]

  entity_bindings:
    tier: "Enterprise"
    entities_owned:
      - entity_ref: "DM-ENT-SKILL-GP"
        role: "creator"
    entities_consumed:
      - entity_ref: "DM-ENT-002"  # EntityType (ADR, Epic, Story)
        role: "consumer"
    domain_model_ref: "squads/sinkra-squad/data/domain-model.yaml"

  activation:
    command: "/governance-pipeline"
    shortcuts:
      - "/governance-pipeline"
      - "/gov-pipe"

  dependencies:
    skills: [roundtable, handoff]
    agents: ["@architect", "@pm", "@sm", "@po"]

  tokens:
    executor:
      - id: TK-GP-015
        name: accountable
        value: "user"
        description: "Human accountable for pipeline decisions"
      - id: TK-GP-016
        name: escalation_target
        value: "user"
        description: "Escalation target for circuit breakers and unresolved gaps"

  roundtable_refs:
    architecture: "RT-2026-03-28-002"
    gap_analysis: "RT-2026-03-28-003"
