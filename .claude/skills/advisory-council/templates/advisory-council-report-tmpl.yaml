# Advisory Council Report Template
# Artifact contract: advisory-council-report
# Lifecycle: draft → blind_synthesis → de_anonymized → final → stale → archived

template:
  name: advisory-council-report
  version: "1.0.0"
  format: markdown

fields:
  - name: subject
    type: string
    required: true
    description: "Topic or question analyzed"

  - name: council_id
    type: string
    required: true
    pattern: "AC-{YYYY-MM-DD}-{seq}"

  - name: date
    type: date
    required: true

  - name: verdict
    type: enum
    values: [PROCEED, PROCEED_WITH_CONDITIONS, RETHINK, ABANDON, INCONCLUSIVE]
    required: true

  - name: score
    type: float
    range: [0, 10]
    required: true

  - name: advisor_verdicts
    type: array
    items:
      - advisor: string
      - verdict: string
      - confidence: enum [HIGH, MEDIUM, LOW]
      - lens_adherence: enum [HIGH, MEDIUM, LOW]
      - key_insight: string

  - name: outsider_status
    type: enum
    values: [nominal, degraded]
    required: true

  - name: anonymization_mapping
    type: object
    description: "Map of random labels (A-E) to advisor identities"
    properties:
      advisor_a: string
      advisor_b: string
      advisor_c: string
      advisor_d: string
      advisor_e: string

sections:
  - executive_summary
  - verdict_breakdown
  - consensus_points
  - conflicts
  - unique_insights
  - expansion_opportunities
  - external_perspective
  - action_plan
  - final_verdict
