# Mandatory Patterns for Workflow-to-Skill Transformation
# Source: SDC Chain Architecture (full-sdc)
# Version: 1.0.0

patterns:
  - id: agent-spawn
    name: "Agent Spawn Pattern"
    required: true
    template: |
      Agent(
        name: "{agent-id}",
        team_name: "{workflow}-{context-id}",
        model: "sonnet",
        prompt: "You are @{agent-id}.
          FIRST: Read .claude/agents/{agent-id}.md
          THEN: Read .claude/skills/{skill}/SKILL.md
          THEN: Execute for context: {context-path}
          When done, SendMessage to 'team-lead' with results."
      )

  - id: result-processing
    name: "SendMessage Result Processing"
    required: true
    states:
      - "completed → TaskUpdate(completed). Proceed."
      - "halted → Show blocker to user. Wait. Resume."
      - "failed → TaskUpdate(note). HALT pipeline."

  - id: agent-persistence
    name: "Agent Persistence (spawn once, reuse)"
    required: true
    description: "Agents needed in multiple phases are spawned ONCE and reused via SendMessage"

  - id: circuit-breaker
    name: "Circuit Breaker (max iterations)"
    required: true
    max_iterations: 3
    escalation: "ESCALATE to user if still failing after max"

  - id: conditional-phase
    name: "Conditional Phase Skip"
    required: true
    template: |
      IF condition:
        Spawn agent, execute
      ELSE:
        TaskUpdate(completed, "Skipped — {reason}"). Proceed.

  - id: stop-gates
    name: "STOP Gates in Sub-Skills"
    required: true
    description: "Every skill phase ends with explicit STOP gate"
    template: |
      > **STOP** — Do not proceed until {condition}. {consequence of skipping}.

  - id: mandatory-learning
    name: "Mandatory Learning Logs"
    required: true
    pre_execution: "Check .aios/learning/entries/{skill-id}/ for promotion candidates (score >= 3.5)"
    post_execution: "Write log even on failure (outcome: failed)"

validation_checklist:
  - "Every sub-skill has YAML frontmatter with required fields"
  - "Every sub-skill has: Dynamic Agent Binding, Pre-Execution Learning, Workflow Phases, Red Flags, Blocking Conditions, Post-Execution Learning"
  - "Master orchestrator uses context: conversation"
  - "Master orchestrator creates team, tasks, spawns agents, processes results"
  - "Every agent has persona file in .claude/agents/ with skills list"
  - "Artifact contracts match step inputs/outputs"
  - "Learning directories exist with .gitkeep"
  - "Circuit breakers for any loops (max 3)"
  - "Conditional phases have skip logic"
  - "No sub-skill has user-invocable: true"
