agent_lenses:
  - agent_id: "@cso"
    persona: "Chief Standards Officer"
    lens: "Governanca, compliance, SOT, registries"
    checklist:
      - "12 dimensoes CSO"
      - "Registry gaps"
      - "SOT conflicts"
      - "Agent authority"
      - "Data governance"
      - "Layer hierarchy"

  - agent_id: "@architect"
    persona: "Aria"
    lens: "Arquitetura, dependencias, packages, breaking changes"
    checklist:
      - "Dependency graph"
      - "Package boundaries"
      - "Cross-repo coherence"
      - "Breaking changes"
      - "Migration path"
      - "Wave gates"

  - agent_id: "@qa"
    persona: "Quinn"
    lens: "Testabilidade, regressao, cobertura"
    checklist:
      - "AC testability"
      - "Testing gaps"
      - "Regression risk"
      - "Integration tests"
      - "E2E coverage"
      - "CodeRabbit config"

  - agent_id: "@db-sage"
    persona: "Database Sage"
    lens: "Schema, pgvector, RLS, data integrity"
    checklist:
      - "Migration safety"
      - "HNSW params"
      - "RLS isolation"
      - "Edge functions"
      - "Data integrity"
      - "Rollback procedures"

  - agent_id: "@aiox-master"
    persona: "AIOX Master"
    lens: "Framework compliance, Constitution"
    checklist:
      - "Story template"
      - "Agent assignments"
      - "SINKRA v3.1/v3.2"
      - "Hub x Spoke compliance"
      - "Constitution"
      - "Missing stories"

  - agent_id: "@sinkra-chief"
    persona: "SINKRA Chief"
    lens: "Composition rules, tokens, processes"
    checklist:
      - "Composition rules"
      - "Token families"
      - "Process mapping"
      - "Organism patterns"
      - "Flywheel/mission alignment"

  - agent_id: "@po"
    persona: "Pax"
    lens: "Stories, ACs, effort, dependencies"
    checklist:
      - "10-point validation"
      - "Effort realism"
      - "Dependency correctness"
      - "Executor/QG assignments"

  - agent_id: "@devops"
    persona: "Gage"
    lens: "CI/CD, deploy, security"
    checklist:
      - "Pipeline integrity"
      - "Deploy strategy"
      - "Infra provisioning"
      - "Security"
      - "Publish workflows"

  - agent_id: "@infra-chief"
    persona: "Infra Chief"
    lens: "Servers, Docker, monitoring"
    checklist:
      - "Service catalog"
      - "Infra provisioning"
      - "Container orchestration"
      - "Monitoring"
      - "Networking"

  - agent_id: "@pm"
    persona: "Morgan"
    lens: "Planning, waves, timeline"
    checklist:
      - "Wave structure"
      - "Timeline realism"
      - "Resource allocation"
      - "Risk management"
      - "Dependency graph"

  - agent_id: "@vision-chief"
    persona: "Vision Chief"
    lens: "Estrategia, visao, mercado"
    checklist:
      - "Strategic alignment"
      - "Market opportunity"
      - "Competitive positioning"

  - agent_id: "@coo-orchestrator"
    persona: "COO"
    lens: "Operacoes, processos, equipe"
    checklist:
      - "Operational feasibility"
      - "Resource availability"
      - "Process efficiency"
