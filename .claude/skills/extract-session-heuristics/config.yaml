process:
  id: SP-EXTRACT-SESSION-HEURISTICS
  version: "4.1.0-gah-calibrate"
  mode: VALIDAR

pack:
  name: extract-session-heuristics
  version: "4.1.0-gah-calibrate"
  description: "Extract operational heuristics from work sessions using Pareto ao Cubo + GAH (Gate de Admissibilidade Heurística) + calibration log for FLAG→BLOCK promotion"
  icon: "brain"
  owner: squad-creator-pro

scope_resolution:
  default_scope: session
  valid_scopes:
    - session
    - project
    - global
  scope_rules:
    session: "Extract from one target session only."
    project: "Extract across all eligible sessions from the target project."
    global: "Extract across all eligible sessions globally."
  required_runtime_keys:
    - extraction_scope

owner_resolution:
  strategy: session-user-first
  required_runtime_keys:
    - heuristic_owner_slug
    - heuristic_owner_handle
    - heuristic_owner_display_name
    - heuristic_id_prefix
  resolution_order:
    - explicit_user_override
    - active_session_user
    - existing_mind_namespace_match
    - ask_human_once_if_ambiguous
  family_rules:
    reuse_existing_extract_family: true
    default_extract_family_suffix: "KE"
  owner_profiles:
    - slug: oalanicolas
      handle: "@oalanicolas"
      display_name: "Alan Nicolas"
      default_extract_prefix: "AN_KE"
    - slug: pedro-valerio
      handle: "@pedro-valerio"
      display_name: "Pedro PV"
      default_extract_prefix: "PV_KE"

artifact_contracts:
  - artifact_id: "decision-cards"
    template_path: "../../minds/{heuristic_owner_slug}/heuristics/decision-cards.yaml"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "heuristic-doc"
    template_path: "../../squads/squad-creator-pro/templates/session-heuristic-tmpl.md"
    lifecycle_states: [draft, validated]
  - artifact_id: "scope-extraction-report"
    template_path: "../../squads/squad-creator-pro/templates/scope-extraction-report-tmpl.md"
    lifecycle_states: [draft, validated]
  - artifact_id: "gah-audit"
    template_path: "../../squads/squad-creator-pro/templates/gah-audit-tmpl.yaml"
    lifecycle_states: [draft, flagged, admitted, rejected]
    output_location: "outputs/minds/gah-audits/{heuristic_owner_slug}/"

gate_admissibilidade_heuristica:
  version: "1.1.0"
  mode: "FLAG"  # FLAG (calculate but don't block) | BLOCK (reject blocks persistence)
  applies_to: "every raw candidate from Phase 1 IDENTIFY"
  filters:
    - id: "test_1_vocabulary_strip"
      goal: "agnosticidade lexical"
    - id: "test_2_cross_domain"
      goal: "largura cross-domain (>=3 instâncias literais)"
    - id: "test_3_other_human"
      goal: "utilidade externa (anti confirmation bias)"
    - id: "test_4_anti_test"
      goal: "tensão sistêmica real (anti tautologia)"
  calibration:
    log_path: "outputs/minds/gah-audits/{heuristic_owner_slug}/calibration.jsonl"
    schema_id: "gah-calibration-v1"
    write_phase: "5.5"
    append_only: true
    line_per_candidate: true
    min_candidates_per_session: 5  # TKN-ESH-THR-002
  promotion_rule:
    sessions_required: 3
    match_rate_threshold: 0.80
    aggregation: "last 3 distinct sessions with >= min_candidates_per_session"
    automation: "advisory"  # v1: log status, do not auto-flip mode
    target: "gate_admissibilidade_heuristica.mode FLAG → BLOCK"

references:
  task: "squads/squad-creator-pro/tasks/an-extract-session-heuristics.md"
  checklist: "squads/squad-creator-pro/checklists/session-heuristics-extraction.md"
  template: "squads/squad-creator-pro/templates/session-heuristic-tmpl.md"
  scope_report_template: "squads/squad-creator-pro/templates/scope-extraction-report-tmpl.md"
  gah_template: "squads/squad-creator-pro/templates/gah-audit-tmpl.yaml"
  decision_cards: "minds/{heuristic_owner_slug}/heuristics/decision-cards.yaml"
