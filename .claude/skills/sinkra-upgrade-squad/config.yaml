pack:
  name: sinkra-upgrade-squad
  version: "1.0.0"
  description: "8-phase SINKRA-native squad upgrade (compliant to native). Consumes /sinkra-validate-squad output as input. Invokes /sinkra-map-process in Phase 3 for brownfield mapping."
  icon: "USQ"
  type: skill
  location: .claude/skills/sinkra-upgrade-squad/

process:
  id: SP-SINKRA-UPGRADE-SQUAD
  mode: MATERIALIZAR
  sinkra_version: "1.2"
  organism: ORG-USQ-001
  molecules: 8    # Assessment, Diagnosis, Mapping, Reviews, QuickWins, Planning, Execution, Validation
  atoms: 2        # Reviewer + Executor (persistent team)

artifact_contracts:
  - artifact_id: gap-diagnosis
    template_path: outputs/squad-upgrades/{squad}/{timestamp}/gap-diagnosis.md
    lifecycle_states: [draft, validated]
  - artifact_id: remediation-epic
    template_path: docs/stories/epic-sinkra-upgrade-{squad}/
    lifecycle_states: [draft, ready, in_progress, done]
  - artifact_id: comparison-dashboard
    template_path: outputs/squad-upgrades/{squad}/{timestamp}/comparison.md
    lifecycle_states: [generated]

supported_modes: [MATERIALIZAR]
bu_mapping: hub-framework

token_count: 4
token_families: [Phase, Wave, Scope, Severity]

knowledge_sources:
  - .claude/rules/skill-standards.md
  - squads/sinkra-squad/workflows/wf-sinkra-native-upgrade.yaml
  - squads/sinkra-squad/checklists/sinkra-native-upgrade-checklist.md

invokes:
  - path: /sinkra-validate-squad
    phase: P1 (Assessment) + P8 (Validation)
    relationship: mandatory deep validation before/after upgrade
  - path: /sinkra-map-process
    phase: P3 (SINKRA Mapping)
    relationship: brownfield process mapping step

process_mapping: squads/sinkra-squad/tasks/sinkra-native-upgrade.md
