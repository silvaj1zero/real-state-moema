# Extracted from: .claude/skills/wave-execute/SKILL.md (CHK-3 — Sensitive domain check)
# Part of: SP-WAVE-EXECUTE process
# Version: 1.1.0
#
# Schema: sensitive_domain_mapping[]
#   - pattern: string              # REQUIRED — glob pattern(s) matching file paths (comma-separated)
#     required_qg: string          # REQUIRED — agent ref (@agent-name) that MUST be in QG for matching files
#     domain: string               # REQUIRED — human-readable label for the sensitive domain

# Sensitive Domain Mapping — File pattern → required QG agent
# Used by CHK-3 during ATM-WE-002 (Story Validation).
#
# Rules:
#   - If story touches files matching a pattern, the corresponding QG agent MUST be assigned.
#   - If story touches files in MULTIPLE sensitive domains, QG must include agents for ALL domains (compound QG).
#   - CHK-3 can ADD required agents but NEVER removes existing QG from YAML.
#   - QG agent from story YAML is authoritative (AUTH-3) — only augmented, never overridden.

sensitive_domain_mapping:
  - pattern: "workspace/*/L0-identity/*, workspace/*/L0-*"
    required_qg: "@cso"
    domain: "Identity / L0 layer"

  - pattern: "packages/db/*, **/migrations/*, *schema*.sql"
    required_qg: "@db-sage"
    domain: "Database / Schema / Migrations"

  - pattern: "**/auth*, **/permission*, **/rls*"
    required_qg: "@architect"
    domain: "Authentication / Permissions / RLS"

  - pattern: "apps/gateway-ai/*"
    required_qg: "@infra-chief"
    domain: "OpenClaw Gateway AI"

  - pattern: ".claude/*, squads/sinkra-squad/data/*"
    required_qg: "@sinkra-chief"
    domain: "AIOX Framework / SINKRA data"

  - pattern: "workspace/*/L1-strategy/pricing*, **/financial*"
    required_qg: "@cso"
    domain: "Pricing / Financial data"
