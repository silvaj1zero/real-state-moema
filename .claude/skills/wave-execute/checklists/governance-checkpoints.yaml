# Extracted from: .claude/skills/wave-execute/SKILL.md (Governance Checkpoints — 9 mandatory)
# Part of: SP-WAVE-EXECUTE process
# Version: 2.0.0

# Governance Checkpoints — 9 mandatory checks enforced by wave-execute pipeline.
# Pipeline NEVER skips governance checkpoints, even for stories deemed "simple".

governance_checkpoints:
  - id: CHK-1
    phase: pre-exec
    description: "Story status == Ready or Draft"
    fail_action: "SKIP story"
    atom_ref: ATM-WE-002

  - id: CHK-2
    phase: pre-exec
    description: "executor + quality_gate fields non-empty"
    fail_action: "HALT story (warn + default @dev for executor only)"
    atom_ref: ATM-WE-002

  - id: CHK-3
    phase: pre-exec
    description: "Sensitive domain files → correct QG agent assigned (see data/sensitive-domain-mapping.yaml)"
    fail_action: "HALT story — return to @po"
    atom_ref: ATM-WE-002
    notes: "CHK-3 can ADD required agents but NEVER removes existing QG from YAML. If story touches files in multiple sensitive domains, QG must include agents for ALL domains (compound QG)."

  - id: CHK-4
    phase: post-exec
    description: "Dev Agent Record has all 4 subsections populated"
    fail_action: "Block QG handoff"
    atom_ref: "ATM-WE-004 (teammate-internal) + ATM-WE-006 (lead re-check)"
    subsections_required:
      - "Agent Model Used (e.g., claude-opus-4-6[1m])"
      - "Debug Log References (session ID or 'N/A — clean execution')"
      - "Completion Notes List (min 1 entry)"
      - "File List (min 1 file — absolute paths)"

  - id: CHK-5
    phase: post-exec
    description: "All AC checkboxes addressed (checked [x] or explicitly noted N/A)"
    fail_action: "Block QG handoff"
    atom_ref: "ATM-WE-004 (teammate-internal) + ATM-WE-006 (lead re-check)"

  - id: CHK-6
    phase: post-qg
    description: "QG Report populated in story file"
    fail_action: "Block Done transition"
    atom_ref: "ATM-WE-004 (teammate-internal) + ATM-WE-006 (lead re-check)"

  - id: CHK-7
    phase: post-qg
    description: "Change Log updated with QG result"
    fail_action: "Block Done transition"
    atom_ref: "ATM-WE-004 (teammate-internal) + ATM-WE-006 (lead re-check)"

  - id: CHK-8
    phase: post-wave
    description: "registry-governance-check.js advisory"
    fail_action: "Log warning"
    atom_ref: ATM-WE-010
    command: "node scripts/registry-governance-check.js --mode advisory"

  - id: CHK-9
    phase: post-batch
    description: "Git commit created (ATM-WE-009B)"
    fail_action: "Block next batch"
    atom_ref: ATM-WE-009B

  - id: CHK-10
    phase: post-merge
    description: "Post-merge integration check: npm run lint && npm run typecheck pass after worktree merge"
    fail_action: "HALT batch — resolve merge/build issues before proceeding"
    atom_ref: ATM-WE-006
