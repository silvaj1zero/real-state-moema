# Wave Plan Template -- Output of MOL-WE-001 / ATM-WE-001
# Persisted to: .aiox/waves/{epic}-wave-{N}/plan.yaml

wave_plan:
  epic: "{epic_id}"
  wave: 1                           # Wave number
  created_at: "{ISO_8601}"
  appetite: "2w"                    # 2w | 6w (Shape Up)

  stories:
    - id: "{story_id}"
      title: "{story_title}"
      priority: P1                  # P0 | P1 | P2 | P3
      estimated_atoms: 3
      dependencies: []              # Story IDs this depends on
      executor: "human"             # human | ai | hybrid
      qg_agent: "@qa"              # Quality gate agent
      status: pending               # pending | in_progress | done | blocked | skipped

  dag:
    # Directed Acyclic Graph of story execution order
    # Stories with no dependencies execute in parallel
    roots: []                       # Story IDs with no dependencies (start here)
    edges: []                       # [{from: "story_id", to: "story_id"}]

  governance:
    max_retries: 3                  # Per-story retry limit before circuit breaker
    qg_threshold: 7                 # Minimum QG score to PASS (1-10)
    sensitive_domains: []           # Domains requiring compound QG

  metadata:
    total_stories: 0
    total_atoms: 0
    parallel_lanes: 1               # Max concurrent story executions
    estimated_duration: ""
