# Retrospective Template — Flywheel output feeding next wave
# Persisted to: .aiox/waves/{epic}-wave-{N}/retrospective.yaml
# ATM-WE-012 MUST reference prior wave retrospective improvements
# and verify they were applied (Flywheel circularidade FW-R8).

retrospective:
  wave: 1                          # Wave number
  velocity: "0 stories / 0 days"
  qg_pass_rate: "0%"              # First-try pass rate
  effort_accuracy: "0.0"          # actual / calibrated ratio
  effort_calibration_next: "0.0"  # actual / documented ratio — feeds TK-WE-019 for next wave
  patterns_identified:
    - "Pattern X observed in stories A, B — consider for next wave"
  improvements_for_next_wave:
    - "Adjust effort calibration ratio to {new_ratio}"
    - "QG agent @Y most effective — assign similar stories"
  deferred_stories:
    - id: "{story_id}"
      backlog_id: "BACKLOG-{epic}-{seq}"
      reason: "..."
  flywheel_metrics:
    momentum: "0 waves done"       # Trending goal: UP (velocity)
    friction: "0 avg QG rounds"    # Trending goal: DOWN
    trending: "baseline"           # improving | stable | degrading | baseline (wave 1)
  flywheel_circularidade:
    verified_improvements_from_prior_wave:
      - improvement: "..."
        applied: true              # true | false
        evidence: "..."
    regressions:
      - metric: "..."
        prior: "..."
        current: "..."
        root_cause: "..."
