# Wave Summary Template — Output of MOL-WE-004 / ATM-WE-010
# Persisted to: .aiox/waves/{epic}-wave-{N}/summary.yaml

wave_summary:
  epic: "{epic_id}"
  wave: 1                         # Wave number
  stories_total: 0
  stories_done: 0
  stories_blocked: 0
  stories_skipped: 0
  deferred_stories:
    - id: "{story_id}"
      backlog_id: "BACKLOG-{epic}-{seq}"
      reason: "QG circuit breaker"
  total_qg_rounds: 0
  first_try_pass_rate: "0%"
  effort_estimated: "0h"          # Documented hours from story files
  effort_calibrated: "0h"         # After TK-WE-019 calibration
  effort_actual: "0h"             # Real elapsed
  commits:
    - "{sha1}"
  wave_gate_result: PASS           # PASS | FAIL
  decisions_made:
    - "Decision description"
  blockers_for_next_wave:
    - "Blocker description"
