pack:
  name: wave-execute
  version: "3.2.0"
  description: "Semi-automated wave execution pipeline with Mission Pattern (DAG) per wave and Flywheel between waves"
  icon: "WE"
  type: skill
  location: .claude/skills/wave-execute/

process:
  id: SP-WAVE-EXECUTE
  mode: GERENCIAR
  sinkra_version: "1.2"
  organism: ORG-WE-001
  molecules: 4
  atoms: 10  # lead-level (ATM-WE-001,002,003,004,005,006,009B,010,011,012). Teammate-internal steps (validate,develop,QG,loop,close) are sub-steps of ATM-WE-004.

artifact_contracts:
  - artifact_id: wave-plan
    template_path: templates/wave-plan.yaml
    lifecycle_states: [draft, approved]
  - artifact_id: wave-summary
    template_path: templates/wave-summary.yaml
    lifecycle_states: [draft, approved]
  - artifact_id: qg-verdict
    template_path: templates/qg-verdict.yaml
    lifecycle_states: [draft, pass, fail]
  - artifact_id: retrospective
    template_path: templates/retrospective.yaml
    lifecycle_states: [draft, approved]

supported_modes: [GERENCIAR, VALIDAR]
bu_mapping: hub-framework

token_count: 19
token_families: [Threshold, Time, Capacity, Context, Executor]

checklist_refs:
  - checklists/story-validation-10pt.md
  - checklists/governance-checkpoints.yaml

# NOTE: sensitive-domain-mapping.yaml lives in data/, referenced via data_refs below

data_refs:
  - data/compound-qg-rules.yaml
  - data/sensitive-domain-mapping.yaml

prerequisites:
  - env: CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS
    value: "1"
    description: "Required for parallel story execution via Agent Teams"

inter_skill_contracts:
  - invokes: roundtable
    at_atom: ATM-WE-011
    input_format: "wave-summary.yaml"
    expected_output: "roundtable-report.md"
    version_constraint: ">=1.1.0"
