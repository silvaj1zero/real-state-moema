pack:
  name: validate-mission-task
  version: "1.0.0"
  description: "Executa o gate VMT de 11 pontos antes da execução de uma task de mission, com enrichment e persistência."
  icon: "VMT"
  type: skill
  location: .claude/skills/validate-mission-task/

process:
  id: SP-VALIDATE-MISSION-TASK
  mode: VALIDAR
  sinkra_version: "1.2"
  organism: ORG-TM-001
  molecules: 1
  atoms: 1

artifact_contracts:
  - artifact_id: vmt-report
    template_path: squads/backlog-ops/templates/vmt-report-tmpl.md
    lifecycle_states: [draft, validated, approved]
  - artifact_id: enriched-mission-handoff
    template_path: squads/sinkra-squad/templates/mission-clickup-handoff-tmpl.yaml
    lifecycle_states: [draft, validated, approved]
  - artifact_id: task-status-journal-update
    lifecycle_states: [generated]

supported_modes: [VALIDAR]
bu_mapping: hub-framework

checklist_refs:
  - squads/backlog-ops/checklists/vmt-checklist.md

task_refs:
  - squads/backlog-ops/tasks/validate-mission-task.md
  - squads/backlog-ops/tasks/start-task.md
  - squads/backlog-ops/tasks/close-task.md

service_dependencies:
  - service: services/clickup/tasks.js
    operations: [getTask, updateStatus, appendJournalEntry, updateTaskDescriptionSafe]
  - service: services/clickup/wave-calculator.js
    operations: [calculateWaves]
  - service: services/clickup/person-resolver.js
    operations: [resolvePerson]

reference_docs:
  - squads/backlog-ops/docs/process-map-task-lifecycle.yaml
