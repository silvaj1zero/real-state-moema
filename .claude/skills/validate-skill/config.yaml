pack:
  name: validate-skill
  version: "2.0.0"
  description: "Validates skills against SINKRA compliance rules — 10 dimensions, 16 checks"
  icon: "VS"
  type: skill
  location: .claude/skills/validate-skill/

process:
  id: SP-VALIDATE-SKILL
  mode: VALIDAR
  sinkra_version: "1.2"
  organism: ORG-VS-001
  molecules: 3
  atoms: 7

artifact_contracts:
  - artifact_id: skill-score-card
    template_path: outputs/sinkra-squad/skill-validations/{name}/{date}/score_card.yaml
    lifecycle_states: [generated, reviewed]

supported_modes: [VALIDAR]
bu_mapping: hub-framework

token_count: 10
token_families: [Identity, Taxonomy, Threshold, Behavior, Permission, Mode]

knowledge_sources:
  - .claude/rules/skill-standards.md
  - .claude/rules/skills.md
  - .claude/skills/skill-registry.yaml

process_mapping: outputs/sinkra-squad/validate-skill/map/process-mapping.yaml
