# Story Development Cycle — Phase Definitions
# Referenced by: SKILL.md (orchestrator)
# Version: 2.0

phases:
  1:
    name: create
    label: "Create Story"
    agent: sm
    agent_activation: "@sm"
    command: "*draft"
    task_file: create-next-story.md
    description: "Scrum Master creates next story from epic/PRD context"
    artifacts_produced:
      - story_file  # docs/stories/{epicNum}.{storyNum}.story.md
    preconditions:
      - "Epic context available (PRD sharded, epic file exists)"
    postconditions:
      - "Story file created with all sections filled"
      - "Status: Draft"
    handoff:
      to_agent: "@po"
      to_command: "*validate-story-draft {story-id}"
      artifact_key: story

  2:
    name: validate
    label: "Validate Story"
    agent: po
    agent_activation: "@po"
    command: "*validate-story-draft {story-id}"
    task_file: validate-next-story.md
    description: "Product Owner validates story quality (10-point checklist)"
    artifacts_produced:
      - validation_result  # GO or NO-GO with score
    preconditions:
      - "Story file exists"
      - "Story status is Draft"
    postconditions:
      - "Validation score >= 7/10 for GO"
      - "If GO: Story status updated to Ready"
    feedback_loop:
      name: validate
      on_fail: "Return to Phase 1 (@sm) for fixes"
      max_retries: 3
      escalation: "HALT — human intervention required"
    handoff:
      to_agent: "@dev"
      to_command: "*develop {story-id}"
      artifact_key: validation

  3:
    name: develop
    label: "Implement Story"
    agent: dev
    agent_activation: "@dev"
    command: "*develop {story-id}"
    task_file: dev-develop-story.md
    description: "Developer implements story with IDS compliance and CodeRabbit self-healing"
    artifacts_produced:
      - implementation  # code changes, test results
    preconditions:
      - "Story validated (status: Ready)"
      - "IDS check completed"
    postconditions:
      - "All acceptance criteria met"
      - "Tests passing"
      - "Status: Ready for Review"
    handoff:
      to_agent: "@qa"
      to_command: "*review {story-id}"
      artifact_key: implementation

  4:
    name: qa_gate
    label: "QA Review"
    agent: qa
    agent_activation: "@qa"
    command: "*review {story-id}"
    task_file: qa-gate.md
    description: "QA reviews implementation against 7 quality checks"
    artifacts_produced:
      - qa_gate  # PASS/CONCERNS/FAIL/WAIVED
    preconditions:
      - "Implementation complete"
      - "Status: Ready for Review"
    postconditions:
      - "QA gate decision documented"
    feedback_loop:
      name: qa
      on_fail: "Return to Phase 3 (@dev) for fixes"
      max_retries: 3
      escalation: "HALT — human intervention required"
    handoff:
      to_agent: "@devops"
      to_command: "*push"
      artifact_key: qa_gate

  5:
    name: push
    label: "Push to Remote"
    agent: devops
    agent_activation: "@devops"
    command: "*push"
    task_file: github-devops-pre-push-quality-gate.md
    description: "DevOps pushes code to remote repository (exclusive authority)"
    artifacts_produced:
      - push_result  # commit SHA, branch, PR number
    preconditions:
      - "QA gate: PASS or CONCERNS or WAIVED"
      - "All tests passing"
    postconditions:
      - "Code pushed to remote"
      - "PR created (if applicable)"
    handoff:
      to_agent: "@po"
      to_command: "*close-story {story-id}"
      artifact_key: push

  6:
    name: close
    label: "Close Story"
    agent: po
    agent_activation: "@po"
    command: "*close-story {story-id}"
    task_file: po-close-story.md
    description: "Product Owner closes story, updates epic, suggests next"
    artifacts_produced:
      - close_result  # story marked Done, next suggestion
    preconditions:
      - "Code pushed to remote"
      - "QA gate passed"
    postconditions:
      - "Story status: Done"
      - "Epic index updated"
      - "Next story suggested"
    handoff:
      to_agent: "@sm"
      to_command: "*draft"
      artifact_key: close
      condition: "Next story available in epic"

# Feedback loops
feedback_loops:
  validate:
    trigger_phase: 2
    return_to_phase: 1
    max_retries: 3
    agents: ["@po", "@sm"]
  qa:
    trigger_phase: 4
    return_to_phase: 3
    max_retries: 3
    agents: ["@qa", "@dev"]
