# Component Specification Template — Phase 3
# Generated by: simon-brown (C4 Model)

component_spec:
  container: "{container name}"
  system: "{system name}"
  slug: "{slug}"
  date: "{ISO date}"
  analyst: "simon-brown"

components:
  - id: "{component-id}"
    name: "{Component Name}"
    technology: "{framework/library}"
    description: "{what this component does}"
    responsibilities:
      - "{responsibility 1}"
    interfaces:
      provided:
        - name: "{interface name}"
          type: "{REST | GraphQL | function | event}"
          description: "{what it exposes}"
      consumed:
        - name: "{interface name}"
          from: "{other component or external system}"
          type: "{REST | SQL | event}"
    dependencies:
      - target: "{component-id or external}"
        relationship: "{uses | calls | reads | writes | subscribes}"
        protocol: "{HTTP | SQL | gRPC | WebSocket | in-process}"
    source_mapping:
      directories: ["{src/module/}"]
      key_files: ["{file1.ts}", "{file2.ts}"]
      entry_point: "{main file}"

mermaid_c4_component: |
  C4Component
    title Component diagram for {container}
    Container_Boundary(cb, "{container}") {
      Component(comp1, "{name}", "{tech}", "{description}")
    }
