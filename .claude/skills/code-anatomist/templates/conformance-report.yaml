# Conformance Report Template — Phase 7
# Generated by: gail-murphy (Reflexion Models)

conformance:
  system: "{system_name}"
  slug: "{slug}"
  date: "{ISO date}"
  iteration: 1
  analyst: "gail-murphy"

high_level_model:
  modules:
    - name: "{module name}"
      description: "{what this module does}"
      source_mapping: "{glob pattern — e.g., apps/api/**}"
  expected_dependencies:
    - from: "{module A}"
      to: "{module B}"
      type: "{uses | calls | imports | reads}"

actual_dependencies:
  extraction_method: "{tool name or LLM inference}"
  dependencies:
    - from: "{source entity}"
      to: "{target entity}"
      file: "{file_path}:{line}"
      mapped_from: "{module A}"
      mapped_to: "{module B}"

reflexion_results:
  convergences:
    - from: "{module A}"
      to: "{module B}"
      evidence: "{file:line}"
      status: "✅ CONVERGENCE"
  divergences:
    - from: "{module A}"
      to: "{module B}"
      evidence: "{file:line}"
      status: "❌ DIVERGENCE"
      severity: "{HIGH | MEDIUM | LOW}"
      category: "{structural | interface | layering | convention}"
      investigation: "{explanation}"
      recommendation: "{fix | accept | re-model}"
  absences:
    - from: "{module A}"
      to: "{module B}"
      status: "⚠️ ABSENCE"
      investigation: "{why expected dependency not found}"

drift_summary:
  convergence_count: 0
  divergence_count: 0
  absence_count: 0
  drift_ratio: "0%"
  risk_level: "{LOW | MEDIUM | HIGH | CRITICAL}"
  iteration_recommendation: "{refine mapping | fix divergences | accept and document}"

risk_inventory:
  - id: "R-001"
    source: "{ATAM | conformance}"
    description: "{risk description}"
    severity: "{HIGH | MEDIUM | LOW}"
    affected_modules: ["{module}"]
    mitigation: "{suggested action}"
