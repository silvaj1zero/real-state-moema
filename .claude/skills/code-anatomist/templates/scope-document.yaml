# Scope Document Template — Phase 0
# Generated by: rick-kazman (QADSAR)

scope:
  system_name: "{system_name}"
  slug: "{slug}"
  source_path: "{source_path}"
  analysis_date: "{ISO date}"
  analyst: "code-anatomist v2.0.0"

boundaries:
  included:
    - "{directory or module included}"
  excluded:
    - "{directory or module excluded}"
  rationale: "{why these boundaries}"

stakeholders:
  - name: "{stakeholder name or role}"
    concerns: ["{quality attribute 1}", "{quality attribute 2}"]
    priority: "{HIGH | MEDIUM | LOW}"

quality_scenarios:
  - id: "QS-001"
    attribute: "{performance | modifiability | security | availability | deployability}"
    scenario: "{stimulus → response measure}"
    priority: "{HIGH | MEDIUM | LOW}"
    views_needed: ["{module_decomposition | data_flow | deployment | runtime}"]

view_selection:
  - view: "{view name}"
    rationale: "{which QS it addresses}"
    tools: ["{tool name}"]
    phases: ["{phase numbers}"]

tool_plan:
  stack_detected: "{from stack-detection.yaml}"
  tools_available:
    - name: "{tool}"
      phase: "{phase number}"
      command: "{command to run}"
  tools_unavailable:
    - name: "{tool}"
      reason: "{why not available}"
      fallback: "LLM inference [CONFIDENCE: REDUCED]"

constraints:
  - "{constraint 1 — e.g., no DB access}"
  - "{constraint 2 — e.g., no runtime environment}"
