# Code Anatomist v2.0.0 — 9-Phase Pipeline Definition
# Source: RT-DD-V2-001 + structured-output.yaml

pipeline:
  name: "code-anatomist-v2"
  version: "2.0.0"
  total_phases: 9
  gates: 5
  human_blocking_gates: ["G3"]
  parallel_groups: 2

phases:
  - id: 0
    name: "Scoping & Goals"
    agents: ["rick-kazman"]
    sinkra_type: Agent
    output_dir: "phase-0-scoping/"
    output_files:
      - "scope-document.yaml"
      - "view-selection.yaml"
      - "tool-plan.yaml"
    gate: "G0"
    source_framework: ["Symphony", "QADSAR"]
    llm_benefit: low
    depends_on: ["Phase -1", "Phase 0.5"]

  - id: 1
    name: "Context Recovery"
    agents: ["simon-brown"]
    sinkra_type: Agent
    output_dir: "phase-1-context/"
    output_files:
      - "c4-context.md"
      - "tech-inventory.yaml"
      - "external-systems.yaml"
    gate: "G1"
    parallel_group: "A"
    source_framework: ["Arc42", "C4"]
    llm_benefit: high
    depends_on: ["G0"]

  - id: 2
    name: "Static Extraction"
    agents: ["data-specialist", "michael-feathers", "martin-fowler"]
    sinkra_type: Worker
    output_dir: "phase-2-extraction/"
    output_files:
      - "dependency-graph.md"
      - "er-diagram.md"
      - "api-surface.yaml"
      - "import-map.yaml"
      - "fact-database.yaml"
    gate: "G1"
    parallel_group: "A"
    source_framework: ["SEI Dali", "Rigi", "Moose"]
    llm_benefit: low
    tools:
      - { name: "dependency-cruiser", stack: "node", command: "npx depcruise --output-type dot src" }
      - { name: "pydeps", stack: "python", command: "pydeps --no-show --output dependency-graph.svg src" }
      - { name: "tbls", stack: "any+db", command: "tbls doc {DSN} --format mermaid" }
      - { name: "prisma db pull", stack: "any+prisma", command: "npx prisma db pull" }
    depends_on: ["G0"]

  - id: 3
    name: "View Fusion"
    agents: ["simon-brown"]
    sinkra_type: Agent
    output_dir: "phase-3-fusion/"
    output_files:
      - "c4-container.md"
      - "c4-component-{container}.md"
      - "view-consistency.yaml"
    gate: "G2"
    source_framework: ["SEI Dali", "Symphony"]
    llm_benefit: medium
    depends_on: ["G1"]

  - id: 4
    name: "Dynamic Analysis"
    agents: []
    sinkra_type: Worker
    output_dir: "phase-4-dynamic/"
    output_files:
      - "sequence-{scenario}.md"
      - "entry-points.yaml"
    gate: null
    parallel_group: "B"
    optional: true
    skip_default: true
    source_framework: ["Ducasse-Pollet"]
    llm_benefit: low
    depends_on: ["G2"]

  - id: 5
    name: "Domain & Data Recovery"
    agents: ["eric-evans", "ronald-ross", "michael-feathers", "barbara-von-halle", "graham-witt"]
    sinkra_type: Agent
    output_dir: "phase-5-domain/"
    output_files:
      - "domain-map.yaml"
      - "rule-catalog.yaml"
      - "decision-model.yaml"
      - "sbvr-rules.md"
      - "enforcement-gap-report.yaml"
    gate: null
    parallel_group: "B"
    source_framework: ["DDD", "von Halle Decision Model", "SBVR"]
    llm_benefit: high
    note: "This is the v1 domain-decoder pipeline"
    depends_on: ["G2"]

  - id: 6
    name: "Architecture Synthesis"
    agents: ["rick-kazman", "simon-brown"]
    sinkra_type: Agent
    output_dir: "phase-6-synthesis/"
    output_files:
      - "arc42-architecture.md"
      - "atam-analysis.yaml"
      - "risk-inventory.yaml"
      - "G3-signoff.md"
    gate: "G3"
    gate_type: "HUMAN-BLOCKING"
    source_framework: ["Horseshoe Model", "ATAM", "Arc42"]
    llm_benefit: high
    depends_on: ["Phase 4 OR Phase 5"]

  - id: 7
    name: "Validation & Conformance"
    agents: ["gail-murphy"]
    sinkra_type: Agent
    output_dir: "phase-7-validation/"
    output_files:
      - "conformance-report.yaml"
      - "drift-analysis.yaml"
      - "risk-inventory-final.yaml"
    gate: "G4"
    source_framework: ["Reflexion Models"]
    llm_benefit: low
    depends_on: ["G3"]

  - id: 8
    name: "Documentation & Decisions"
    agents: ["simon-brown"]
    sinkra_type: Agent
    output_dir: "phase-8-documentation/"
    output_files:
      - "arc42-final.md"
      - "adr/"
      - "executive-summary.md"
      - "fitness-functions.yaml"
    gate: null
    source_framework: ["ADRs", "Arc42"]
    llm_benefit: high
    depends_on: ["G4"]

gates:
  - id: "G0"
    after_phase: 0
    type: "auto"
    criteria:
      - "scope-document.yaml exists and > 500 bytes"
      - "quality_scenarios field present"
      - "boundaries defined"

  - id: "G1"
    after_phases: [1, 2]
    type: "auto"
    criteria:
      - "c4-context.md exists with C4Context syntax"
      - "fact-database.yaml exists and > 1000 bytes"
      - "external systems match between context and extraction"

  - id: "G2"
    after_phase: 3
    type: "auto"
    criteria:
      - "c4-container.md exists with C4Container syntax"
      - "containers match tech-inventory from Phase 1"
      - "every container maps to module in Phase 2"

  - id: "G3"
    after_phase: 6
    type: "HUMAN-BLOCKING"
    criteria:
      - "arc42-architecture.md exists and > 2000 bytes"
      - "G3-signoff.md exists"
      - "verdict = APPROVED or APPROVED_WITH_NOTES"
      - "verdict != REJECTED"

  - id: "G4"
    after_phase: 7
    type: "auto"
    criteria:
      - "conformance-report.yaml exists"
      - "reflexion results include convergence/divergence/absence"
      - "all Phase 3 modules appear in conformance mapping"

parallel_groups:
  - id: "A"
    phases: [1, 2]
    after_gate: "G0"
    before_gate: "G1"
    description: "Context Recovery and Static Extraction run in parallel"

  - id: "B"
    phases: [4, 5]
    after_gate: "G2"
    before_phase: 6
    description: "Dynamic Analysis (optional) and Domain Recovery run in parallel"
