# Code Anatomist v2.0.0 — Tool Catalog per Stack
# Source: docs/research/2026-04-03-software-reverse-engineering-tools/catalog.md

tools:
  # Architecture dimension
  - name: "Mermaid"
    dimension: architecture
    stacks: ["any"]
    install: "Built-in (text-based, no install needed)"
    phases: [1, 3, 6, 8]
    output_formats: ["SVG", "PNG", "inline_markdown"]
    priority: 1
    note: "Always available — default diagramming tool"

  - name: "Structurizr DSL"
    dimension: architecture
    stacks: ["any"]
    install: "docker pull structurizr/lite"
    phases: [1, 3, 6]
    output_formats: ["PlantUML", "Mermaid", "C4", "SVG", "JSON"]
    priority: 2
    note: "Optional — for teams using Structurizr"

  # Dependency dimension
  - name: "dependency-cruiser"
    dimension: dependency
    stacks: ["javascript", "typescript"]
    install: "npx depcruise (no global install needed)"
    command: "npx depcruise --output-type dot src | dot -T svg > deps.svg"
    phases: [2]
    output_formats: ["SVG", "DOT", "JSON", "Mermaid", "HTML"]
    priority: 1

  - name: "pydeps"
    dimension: dependency
    stacks: ["python"]
    install: "pip install pydeps"
    command: "pydeps --no-show --output dependency-graph.svg src"
    phases: [2]
    output_formats: ["SVG"]
    priority: 1

  # Data model dimension
  - name: "tbls"
    dimension: data
    stacks: ["any+db_access"]
    install: "go install github.com/k1LoW/tbls@latest"
    command: "tbls doc {DSN} --format mermaid"
    phases: [2, 5]
    output_formats: ["Markdown", "PlantUML", "Mermaid", "JSON", "YAML"]
    priority: 1
    requires: "Database connection string"

  - name: "Prisma db pull"
    dimension: data
    stacks: ["any+prisma"]
    install: "npx prisma (part of prisma package)"
    command: "npx prisma db pull --schema=./schema.prisma"
    phases: [2]
    output_formats: ["prisma_schema"]
    priority: 1
    requires: "Database connection string in .env"

  - name: "ERAlchemy2"
    dimension: data
    stacks: ["python+sqlalchemy"]
    install: "pip install eralchemy2"
    command: "eralchemy2 -i 'sqlite:///db.sqlite3' -o erd.svg"
    phases: [2]
    output_formats: ["SVG", "PNG", "PDF"]
    priority: 2

  # API dimension
  - name: "FastAPI built-in"
    dimension: api
    stacks: ["python+fastapi"]
    install: "Built-in (auto-generates /docs and /openapi.json)"
    command: "curl http://localhost:8000/openapi.json"
    phases: [2]
    output_formats: ["openapi_3_x"]
    priority: 1

  - name: "tsoa"
    dimension: api
    stacks: ["typescript"]
    install: "npm install tsoa"
    phases: [2]
    output_formats: ["openapi_3_1"]
    priority: 2

  - name: "Spectral"
    dimension: api
    stacks: ["any+openapi"]
    install: "npm install @stoplight/spectral-cli"
    command: "npx spectral lint openapi.yaml"
    phases: [2, 7]
    output_formats: ["lint_reports", "json"]
    priority: 2
    note: "API linting and validation"

  # Infrastructure dimension
  - name: "Docker inspect"
    dimension: infra
    stacks: ["any+docker"]
    install: "Built-in (requires Docker)"
    phases: [2]
    output_formats: ["JSON"]
    priority: 1

  # Quality / Conformance dimension
  - name: "SonarQube"
    dimension: multi
    stacks: ["any"]
    install: "External — requires server setup"
    phases: [7]
    output_formats: ["reports", "metrics", "dashboards"]
    priority: 3
    note: "Generate command only — do not execute (external infra required)"

  - name: "CodeScene"
    dimension: multi
    stacks: ["any+git"]
    install: "External — SaaS or self-hosted"
    phases: [7]
    output_formats: ["hotspot_maps", "reports"]
    priority: 3
    note: "Behavioral analysis from git history"

stack_detection:
  manifests:
    - file: "package.json"
      stack: "javascript/typescript"
      tools_enabled: ["dependency-cruiser", "tsoa"]
    - file: "requirements.txt"
      stack: "python"
      tools_enabled: ["pydeps"]
    - file: "pyproject.toml"
      stack: "python"
      tools_enabled: ["pydeps"]
    - file: "go.mod"
      stack: "go"
      tools_enabled: []
    - file: "Cargo.toml"
      stack: "rust"
      tools_enabled: []
    - file: "pom.xml"
      stack: "java"
      tools_enabled: []
    - file: "build.gradle"
      stack: "java"
      tools_enabled: []
    - file: "*.csproj"
      stack: "dotnet"
      tools_enabled: []
    - file: "prisma/schema.prisma"
      stack: "prisma"
      tools_enabled: ["Prisma db pull"]
    - file: "docker-compose.yml"
      stack: "docker"
      tools_enabled: ["Docker inspect"]
