# Code Anatomist Skill — SINKRA Process Configuration v3.0.0
# Renamed from domain-decoder (RT-DD-V2-001)
# Updated: 2026-04-04 (RT-ARCH-BRIDGE-001 + SINKRA audit)

process_id: SP-CODE-ANATOMIST-001
sinkra_version: "3.2"
mode: EXPLORAR  # Primary mode — software reverse engineering from any codebase

# Skill metadata (mirrors SKILL.md frontmatter)
skill:
  name: code-anatomist
  version: "3.0.0"
  tier: Tier3
  context: fork
  owner_squad: code-anatomist
  sinkra_tier: "Pro"

# Pipeline v3 — 9 phases + M2-Analyze + M3-Adopt (RT-DD-V2-001 + RT-ARCH-BRIDGE-001)
pipeline:
  version: "9-phase-v3"
  phases:
    - id: 0
      name: "Scoping & Goals"
      agents: [rick-kazman]
      output: "phase-0-scoping/"
      gate: G0
      llm_benefit: low

    - id: 1
      name: "Context Recovery"
      agents: [simon-brown]
      output: "phase-1-context/"
      parallel_group: A
      llm_benefit: high

    - id: 2
      name: "Static Extraction"
      agents: [data-specialist, michael-feathers, martin-fowler]
      output: "phase-2-extraction/"
      parallel_group: A
      gate: G1
      llm_benefit: low

    - id: 3
      name: "View Fusion"
      agents: [simon-brown]
      output: "phase-3-fusion/"
      gate: G2
      llm_benefit: medium

    - id: 4
      name: "Dynamic Analysis"
      agents: []
      output: "phase-4-dynamic/"
      parallel_group: B
      optional: true
      llm_benefit: low

    - id: 5
      name: "Domain & Data Recovery"
      agents: [eric-evans, ronald-ross, michael-feathers, barbara-von-halle, graham-witt]
      output: "phase-5-domain/"
      parallel_group: B
      llm_benefit: high

    - id: 6
      name: "Architecture Synthesis"
      agents: [rick-kazman, simon-brown]
      output: "phase-6-synthesis/"
      gate: G3
      gate_type: HUMAN-BLOCKING
      llm_benefit: high

    - id: 7
      name: "Validation & Conformance"
      agents: [gail-murphy]
      output: "phase-7-validation/"
      gate: G4
      llm_benefit: low

    - id: 8
      name: "Documentation & Decisions"
      agents: [simon-brown]
      output: "phase-8-documentation/"
      llm_benefit: high

  parallel_groups:
    A:
      phases: [1, 2]
      after_gate: G0
      before_gate: G1
    B:
      phases: [4, 5]
      after_gate: G2
      before_phase: 6

  gates:
    - id: G0
      after_phase: 0
      type: auto
      criteria: "scope-document.yaml exists, > 500 bytes, has quality_scenarios"

    - id: G1
      after_phases: [1, 2]
      type: auto
      criteria: "c4-context.md + fact-database.yaml exist, cross-check external systems"

    - id: G2
      after_phase: 3
      type: auto
      criteria: "c4-container.md exists, containers match tech-inventory"

    - id: G3
      after_phase: 6
      type: HUMAN-BLOCKING
      criteria: "arc42-architecture.md > 2KB, G3-signoff.md with APPROVED verdict"

    - id: G4
      after_phase: 7
      type: auto
      criteria: "conformance-report.yaml with reflexion results"

# M2-Analyze + M3-Adopt molecules (RT-ARCH-BRIDGE-001)
molecules:
  M1_extract:
    name: "Extraction Pipeline"
    pattern: Sequential-Gate
    phases: [0, 1, 2, 3, 4, 5, 6, 7, 8]

  M2_analyze:
    name: "Analysis & Comparison"
    pattern: Fan-Out
    operations:
      - compare: "Diff between 2 extractions → delta-report.yaml"
      - audit: "Self-analysis via baseline → conformance-delta.yaml"

  M3_adopt:
    name: "Pattern Adoption"
    pattern: Sequential-Gate
    operations:
      - select: "Choose pattern from delta-report"
      - propose: "Generate adoption-proposal.yaml"
      - handoff: "Inter-BU handoff → @architect"
    handoff_scope: inter_bu

# Artifact contracts (full set — 15 contracts)
artifact_contracts:
  # v1 (domain extraction)
  - artifact_id: "rule-catalog"
    template_path: "squads/code-anatomist/templates/rule-catalog-tmpl.md"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "domain-map"
    template_path: "squads/code-anatomist/templates/domain-map-tmpl.yaml"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "decision-model"
    template_path: "squads/code-anatomist/templates/decision-model-tmpl.yaml"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "enforcement-gap-report"
    template_path: "squads/code-anatomist/templates/enforcement-gap-report-tmpl.md"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "sinkra-token-map"
    template_path: "squads/code-anatomist/templates/sinkra-token-map-tmpl.yaml"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "sinkra-composition-proposal"
    template_path: "squads/code-anatomist/templates/sinkra-composition-proposal-tmpl.yaml"
    lifecycle_states: [draft, validated, approved]
  # v2 (architecture extraction)
  - artifact_id: "scope-document"
    template_path: "squads/code-anatomist/templates/scope-document-tmpl.yaml"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "context-diagram"
    template_path: "squads/code-anatomist/templates/c4-context-tmpl.md"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "static-fact-database"
    template_path: "squads/code-anatomist/templates/fact-database-tmpl.yaml"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "arc42-architecture-doc"
    template_path: "squads/code-anatomist/templates/arc42-tmpl.yaml"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "conformance-report"
    template_path: "squads/code-anatomist/templates/conformance-report-tmpl.yaml"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "adr-library"
    template_path: "squads/code-anatomist/templates/adr-library-tmpl.md"
    lifecycle_states: [draft, validated, approved]
  # M2/M3 (compare, audit, adopt)
  - artifact_id: "delta-report"
    template_path: "squads/code-anatomist/templates/delta-report-tmpl.yaml"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "conformance-delta"
    template_path: "squads/code-anatomist/templates/conformance-delta-tmpl.yaml"
    lifecycle_states: [draft, validated, approved]
  - artifact_id: "adoption-proposal"
    template_path: "squads/code-anatomist/templates/adoption-proposal-tmpl.yaml"
    lifecycle_states: [draft, proposed, approved, implementing, completed, rejected]
    handoff_scope: inter_bu

# Output convention
output:
  base_path: "outputs/decoded/{slug}/"
  index_file: "00-extraction-index.yaml"
  baseline: "outputs/decoded/allfluence/"
  baseline_ttl_days: 90

# Erratas (quality rules — carried from SKILL.md, updated for v3)
erratas:
  E1: "No synthesizing — each phase spawns dedicated agent or reads actual files"
  E2: "Save before advance — output MUST be written to disk before gate"
  E3: "Relevant content per phase — extract content relevant to current phase dimension"
  E8: "Correct output path — outputs/decoded/{slug}/ only"
  E9: "Gates with commands — ls + wc -c + grep VETO"
  E10: "Input collection — 8 mandatory questions (Q1-Q8) before any agent spawns"
