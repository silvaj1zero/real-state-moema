# Extracted from: .claude/skills/handoff/SKILL.md (ATM-003)
# Part of: SP-HANDOFF-GEN process
# Version: 3.1.0
#
# Schema: scopes
#   <scope_id>:                    # string — intra_processo | intra_bu | inter_bu
#     description: string          # REQUIRED — what this scope means
#     criteria: string[]           # REQUIRED — conditions that trigger this scope classification
#     human_signoff:               # REQUIRED — { required: bool, recommendation: string, approver?: string }
#     handoff_format: string       # REQUIRED — format description for the handoff document
#     artifact_sections:           # REQUIRED — { artifacts_section: enum, signoff_section: enum }
#     examples: string[]           # REQUIRED — concrete examples of when this scope applies
#     signoff_template: object     # OPTIONAL (inter_bu only) — template fields for human approval
#     enforcement: object          # OPTIONAL (inter_bu only) — pipeline halt behavior (atom + molecule refs)
#
# Scope Classification Rules for Handoff Generation
# Used by ATM-003 (Classify Handoff Scope) in MOL-HO-001 (Context Extraction)
# Reference: SINKRA v3.1 Extensions — agent-handoff protocol (.claude/rules/agent-handoff.md)

scope_classification:
  description: >
    Determines the handoff scope from session context (Q1-Q4).
    Scope affects signoff requirements, artifact format, and delivery protocol.
  default: intra_processo
  source_atom: ATM-003

scopes:
  intra_processo:
    description: "Same project, same team, same session continuation"
    criteria:
      - "Work stays within the same project/repository"
      - "Same team or individual continues the work"
      - "Session continuation — picking up where you left off"
    human_signoff:
      required: false
      recommendation: "Not required"
    handoff_format: "Standard handoff format (markdown + YAML summary)"
    artifact_sections:
      artifacts_section: optional
      signoff_section: not_required
    examples:
      - "Developer ending session, next session continues same feature"
      - "Same squad member picking up a story tomorrow"
      - "/handoff at end of coding session"

  intra_bu:
    description: "Same Business Unit, different project or team"
    criteria:
      - "Work crosses project boundaries within the same BU"
      - "Different team or squad within the same Business Unit picks up"
      - "Context transfer needed between related but distinct workstreams"
    human_signoff:
      required: false
      recommendation: "Recommended — adds accountability"
    handoff_format: "Standard format + artifacts[] section recommended"
    artifact_sections:
      artifacts_section: recommended
      signoff_section: recommended
    examples:
      - "dev-squad handing off to qa-squad within bu-tecnologia"
      - "Feature complete, handing to a different squad for integration"
      - "Cross-squad collaboration within the same domain"

  inter_bu:
    description: "Different Business Unit entirely"
    criteria:
      - "Work crosses Business Unit boundaries"
      - "Target consumer is in a different BU than the producer"
      - "Different organizational domain, different accountability chain"
    human_signoff:
      required: true
      recommendation: "MANDATORY — Constitution Article VIII (NON-NEGOTIABLE)"
      approver: "Human accountable for the receiving BU"
    handoff_format: "Full format with signoff section MANDATORY"
    artifact_sections:
      artifacts_section: required
      signoff_section: required
    signoff_template:
      required: true
      approver: "{human-accountable-name}"
      approved_at: null    # Filled after approval
      approved: false      # Set to true after human confirms
    examples:
      - "bu-tecnologia handing off to bu-comercial"
      - "bu-producao delivering assets to bu-estrategia"
      - "Cross-BU process handoff (e.g., production to sales)"
    enforcement:
      atom: ATM-009
      molecule: MOL-HO-004
      behavior: >
        Pipeline halts at ATM-009. Human is presented with approval prompt.
        If approved: artifact_status = approved, pipeline completes.
        If rejected: artifact_status = rejected, reason logged, pipeline ends.

# Classification Logic (for ATM-003 implementation)
classification_rules:
  step_1: "Extract project name and BU from Q1 context"
  step_2: "Determine if the consumer (next session) is in the same project/team/BU"
  step_3: "Apply scope based on boundary crossing"
  fallback: "If ambiguous, default to intra_processo (most common for /handoff)"
  escalation: "If scope cannot be determined, ask user to clarify target audience"

# BU Reference (project-agnostic — auto-detect workspace/*/L1-strategy/bu-map.yaml)
bu_reference:
  source: "workspace/*/L1-strategy/bu-map.yaml"
  note: "Resolved at runtime by scanning workspace/ for the active project's bu-map.yaml"
  known_bus:
    - bu-tecnologia
    - bu-comercial
    - bu-producao
    - bu-estrategia
    - bu-operacoes

# Related Files (project-agnostic paths)
references:
  agent_handoff_protocol: ".claude/rules/agent-handoff.md"
  constitution_article_viii: ".aiox-core/constitution.md"
  bu_map: "workspace/*/L1-strategy/bu-map.yaml"
  skill_md: ".claude/skills/handoff/SKILL.md"
  note: "Paths use wildcards for project-agnostic resolution. .aiox-core/ is the Hub-canonical path; Spokes may use .aiox-core/."
