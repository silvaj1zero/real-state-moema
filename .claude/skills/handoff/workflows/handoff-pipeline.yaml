# =============================================================================
# Handoff Generation Pipeline — Workflow YAML
# Source: .claude/skills/handoff/SKILL.md (v3.1)
# Phase 4 — SINKRA Skills Compliance Roadmap
# =============================================================================

workflow:
  id: "WF-HANDOFF-001"
  skill_ref: "handoff"
  process_ref: "SP-HANDOFF-GEN"
  version: "1.0.0"
  molecules: 4
  atoms: 11

  state_machine: "IDLE -> COLLECTING -> ASSEMBLING -> VALIDATING -> PERSISTING -> [SIGNING] -> COMPLETE"

  # ---------------------------------------------------------------------------
  # MOL-HO-001: Context Extraction
  # Pattern: (ATM-001 || ATM-002) -> ATM-003
  # ---------------------------------------------------------------------------

  steps:
    - id: 1
      atom_ref: "ATM-HO-001"
      molecule_ref: "MOL-HO-001"
      name: "Extract Session Context"
      executor: "Agent"
      inputs:
        - "Conversation context (Q1-Q4: project name, what was done, what's next, vetos)"
      outputs:
        - "Q1-Q4 populated with concrete content"
      on_success: 3
      on_failure: "escalate"
      gate: "Q1-Q4 all populated"
      timeout: null
      parallel_with: [2]
      notes: "Extracts answers from conversation WITHOUT asking user. Fallback to Human only if project name genuinely ambiguous."

    - id: 2
      atom_ref: "ATM-HO-002"
      molecule_ref: "MOL-HO-001"
      name: "Detect Project State"
      executor: "Worker"
      inputs:
        - "Current working directory"
        - "Git repository state"
      outputs:
        - "Date, folder tree, recent files, git diff"
      on_success: 3
      on_failure: "escalate"
      gate: null
      timeout: null
      parallel_with: [1]
      notes: "Runs Glob, Bash(git) in parallel. On ALL tools failing: escalate to Human with manual path request."

    - id: 3
      atom_ref: "ATM-HO-003"
      molecule_ref: "MOL-HO-001"
      name: "Classify Handoff Scope"
      executor: "Agent"
      inputs:
        - "Q1-Q4 context (from ATM-001)"
        - "Project state (from ATM-002)"
      outputs:
        - "Scope (intra_processo | self_continuation | intra_bu | inter_bu)"
        - "Type (session | agent_transfer | phase_transition | roundtable_summary | self_continuation)"
        - "Template selection (lite | full)"
      on_success: 4
      on_failure: "halt"
      gate: "Scope, type, and template resolved"
      timeout: null
      notes: "P2/P3 + intra_processo/self_continuation -> lite template. P0/P1 or intra_bu/inter_bu -> full template. If inter_bu, flag human signoff required at ATM-009."

  # ---------------------------------------------------------------------------
  # MOL-HO-002: Document Assembly
  # Pattern: ATM-004 -> ATM-005
  # ---------------------------------------------------------------------------

    - id: 4
      atom_ref: "ATM-HO-004"
      molecule_ref: "MOL-HO-002"
      name: "Resolve Template Parameters"
      executor: "Agent"
      inputs:
        - "Q1-Q4 context"
        - "Scope and type (from ATM-003)"
        - "Project state (from ATM-002)"
      outputs:
        - "4 SINKRA parameter categories resolved (Identity, Executor, Threshold, Context)"
        - "Priority classification (P0-P3)"
      on_success: 5
      on_failure: "halt"
      gate: "All 4 parameter categories resolved"
      timeout: null
      token_refs:
        - "TK-HO-003 (completeness_score_min: 7.0)"
        - "TK-HO-004 (glossary_min_terms: 10)"
        - "TK-HO-005 (sections_min: 8)"
        - "TK-HO-012 (max_handoff_size: 2000 words)"

    - id: 5
      atom_ref: "ATM-HO-005"
      molecule_ref: "MOL-HO-002"
      name: "Generate Handoff Document"
      executor: "Agent"
      inputs:
        - "Selected template (lite or full)"
        - "Resolved parameters (from ATM-004)"
        - "Q1-Q4 + detected context"
      outputs:
        - "Complete handoff document (all sections populated, zero unresolved placeholders)"
      on_success: 6
      on_failure: "halt"
      gate: "All sections populated, within size limit (TK-HO-012)"
      timeout: null
      notes: "Size limits: P3=500w, P2=1500w, P1=3000w, P0=unlimited."

  # ---------------------------------------------------------------------------
  # MOL-HO-003: Quality Assurance & Persistence
  # Pattern: ATM-006 -> [ATM-007 conditional] -> ATM-008 -> ATM-010 -> ATM-011
  # ---------------------------------------------------------------------------

    - id: 6
      atom_ref: "ATM-HO-006"
      molecule_ref: "MOL-HO-003"
      name: "Validate Handoff Quality"
      executor: "Agent"
      inputs:
        - "Generated handoff document (from ATM-005)"
      outputs:
        - "Completeness score (0-10)"
        - "Per-item scores (10-point or 6-point checklist)"
      on_success: 8
      on_failure: 7
      gate: "score >= 7 (TK-HO-003) for full template; score >= 4 for lite template"
      timeout: null
      notes: "Full template uses 10-point checklist. Lite template uses 6-point checklist (quality-checklist-lite.md)."

    - id: 7
      atom_ref: "ATM-HO-007"
      molecule_ref: "MOL-HO-003"
      name: "Auto-Fix Defects"
      executor: "Agent"
      inputs:
        - "Items with score = 0 (from ATM-006)"
        - "Conversation context"
      outputs:
        - "Fixed handoff document"
        - "Re-evaluated score"
      on_success: 8
      on_failure: 8
      gate: null
      timeout: null
      conditional: "Only executes if ATM-006 score < threshold"
      notes: "Max 1 retry cycle (TK-HO-011). If still below threshold after fix: emit warning, persist with artifact_status: draft."

    - id: 8
      atom_ref: "ATM-HO-008"
      molecule_ref: "MOL-HO-003"
      name: "Persist Handoff Artifact"
      executor: "Worker"
      inputs:
        - "Validated handoff document"
        - "Score and status"
      outputs:
        - "Markdown file: docs/sessions/{YYYY-MM}/{date}-{project}-handoff.md"
        - "YAML summary: .aiox/handoffs/handoff-session-to-next-{date}.yaml"
        - "Registry entry: docs/sessions/registry.yaml"
      on_success: 9
      on_failure: "escalate"
      gate: null
      timeout: null
      notes: "Dual output (markdown + YAML). Score >= 7 -> artifact_status: approved. Score < 7 -> artifact_status: draft. TTL: 30 days (TK-HO-002)."

    - id: 9
      atom_ref: "ATM-HO-010"
      molecule_ref: "MOL-HO-003"
      name: "Record Journey Log Entry"
      executor: "Worker"
      inputs:
        - "Handoff ID and metadata (from ATM-008)"
      outputs:
        - "Birth event appended to docs/sessions/journey-log.yaml"
      on_success: 10
      on_failure: "continue"
      gate: null
      timeout: null
      notes: "SINKRA Extension 7 — Journey Log Universal. Failure is NON-BLOCKING."

    - id: 10
      atom_ref: "ATM-HO-011"
      molecule_ref: "MOL-HO-003"
      name: "Update Baseline KPIs"
      executor: "Worker"
      inputs:
        - "All entries from docs/sessions/registry.yaml"
      outputs:
        - "Updated docs/sessions/baseline-kpi.yaml (running averages, distributions)"
      on_success: 11
      on_failure: "continue"
      gate: null
      timeout: null
      notes: "M6 — Baseline de KPIs. Meaningful after 5+ handoffs (baseline_established: true). Failure is NON-BLOCKING."

  # ---------------------------------------------------------------------------
  # MOL-HO-004: Artifact-Handoff (conditional)
  # Pattern: [ATM-009 conditional on inter_bu]
  # ---------------------------------------------------------------------------

    - id: 11
      atom_ref: "ATM-HO-009"
      molecule_ref: "MOL-HO-004"
      name: "Human Signoff"
      executor: "Human"
      inputs:
        - "Persisted handoff file path"
        - "Score and scope metadata"
      outputs:
        - "Human approval/rejection decision"
      on_success: "COMPLETE"
      on_failure: "COMPLETE"
      gate: "User approves inter_bu delivery"
      timeout: null
      conditional: "Only executes if handoff_scope == inter_bu (from ATM-003)"
      notes: "SINKRA Constitution requires human signoff for inter-BU handoffs. If approved: artifact_status -> approved. If rejected: artifact_status -> rejected, log reason, end."
