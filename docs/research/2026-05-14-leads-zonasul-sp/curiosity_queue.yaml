    finding: |
      Dataset TPCL (Cadastro de Contribuinte Imobiliário) público desde 2016 via GeoSampa,
      3M+ registros, 120MB, formato OGC 9.3 PostGIS. Campos confirmados via WebSearch:
      SQL, área total, área construída, endereço, tipo de uso, padrão construtivo + uso
