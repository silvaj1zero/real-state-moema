    question: |
      Qual é o schema exato do dataset ITBI SP 2026? CPF/CNPJ adquirente público?
    finding: |
      Receita Municipal SP explicitamente OMITE CPF/CNPJ adquirente/transmitente
      por sigilo fiscal. Campos disponíveis: SQL, endereço, valor de transação declarado,
      data da transação, cartório de registro. Cobertura 2019-presente. Formatos XLSX e ODS.
      Não cobre rurais nem ITBI parcelado PPI. Implicação: feature L3 fica
      como Δ-preço-por-bairro/rua (forte sinal), SEM grafo-por-pessoa/holding.
    sources:
      - https://prefeitura.sp.gov.br/web/fazenda/w/acesso_a_informacao/31501
      - https://prefeitura.sp.gov.br/web/fazenda/w/noticias/31551
      - https://www.itbimap.com.br/metodologia
    confidence: High
    decision: |
      Manter ingest ITBI no Epic 7 com escopo reduzido (sem grafo-por-pessoa).
      Atalho operacional: ITBI Map como fonte de validação durante POC.

