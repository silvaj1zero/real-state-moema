  - id: CQ-011
    sq: SQ-6
    type: ml_methodology
    priority: P2
    status: RESOLVED
    resolved_at: '2026-05-14'
    resolved_in: wave-2
    question: Platt vs isotonic calibration para XGBoost lead scoring?
    finding: |
      Regra de bolso: Platt (sigmoid) para < 1k calibration samples; isotonic para ≥ 1k.
      Isotonic é +22% melhor em ECE em média (MDPI 2025 lead generation paper) mas
      pode overfittar com poucos dados. Imbalanced classes: ambos funcionam, com pequena
      vantagem sigmoid pela flexibilidade de intercept.
    sources:
      - https://scikit-learn.org/stable/modules/calibration.html
      - https://www.blog.trainindata.com/complete-guide-to-platt-scaling/
      - https://machinelearningmastery.com/probability-calibration-for-imbalanced-classification/
      - https://www.mdpi.com/2227-7390/13/13/2183
    confidence: High
    decision: |
      Wave B Epic 7: começar com Platt (sigmoid), migrar para isotonic
      quando calibration set ≥ 1k leads anotados.

