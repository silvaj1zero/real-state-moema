    question: Jurisprudência LGPD 2025-2026 captação imobiliária + scraping pós Radar Tec nº3?
    finding: |
      NENHUMA SANÇÃO PÚBLICA contra imobiliária ou martech imobiliária encontrada em 2024-2026.
