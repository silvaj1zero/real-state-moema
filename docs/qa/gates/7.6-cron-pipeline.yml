status_reason: 'Re-gate 2026-05-23 against pre-deploy inline fix to migration 013 (uncommitted, applied by @db-sage Dara). Phase 1 deploy on Supabase branch `staging-epic7` (isolated, disposable) surfaced SQLSTATE 42809 on v_crawl_health.avg_duration_ms — parser bound FILTER clause to outer ROUND() (scalar) instead of inner AVG() (aggregate). Fix: re-nest FILTER inside ROUND() so it applies to AVG() before NUMERIC cast (lines 197-207). View column signature (avg_duration_ms) intact — migration 018 ALTER VIEW remains compatible. Justified exception to migration-immutability rule documented in inline CHANGELOG block at top of 013: migration NEVER applied successfully in any environment (parser aborted before DDL commit on first deploy attempt to isolated branch); zero production state to protect; Path B (new migration 020 with DROP/CREATE) technically infeasible because 013 parser error aborts the migration transaction, preventing 020 from ever executing — and migration 018 already depends on the view existing, so the dependency chain only works if 013 succeeds. Tests: 455/455 PASS (47 files, 49.70s) — no regression; fix is SQL-only, no app code touched. All 11 ACs remain PASS. Pre-deploy bug catch is a SUCCESS signal of the Phase 1 isolated-branch deploy protocol — bug surfaced safely in disposable environment before any prod-state risk. New issue FIX-DEPLOY-001 logged as RESOLVED. Verdict: PASS (maintained). Re-gate 2026-05-20 details retained below for audit trail. ORIGINAL 2026-05-20 RE-GATE: Re-gate of commit cac7b9a against prior CONCERNS gate (fde1ca3, 2026-05-18). All 4 medium issues are RESOLVED in code via two new migrations (018 + 019), an in-place edit to 013, and a documentation expansion of the AC9 PoC. INFRA-001: pgmq is now pinned to VERSION ''1.5.1'' in migration 013 line 45 — exactly the version validated by @data-engineer in docs/poc/7.6-pgmq-availability-check.md. pg_cron VERSION pin in migration 012 was deliberately NOT applied because 012 was already merged/applied in a prior wave and is treated as immutable; the Dev decision is documented in the story Change Log (2026-05-19 entry) and is acceptable QA-side because pg_cron is not in the function-resolution path that pgmq is — pg_cron API surface is stable across 1.6.x and any drift would be observable in cron.job_run_details. SEC-001: migration 018 explicitly declares `security_invoker = true` on v_crawl_health, removing the implicit-RLS audit ambiguity. SEC-001 dashboard policy for `authenticated` role is intentionally left to a follow-up policy story (acknowledged in migration 018 header comment). INFRA-002: migration 019 implements the cron.timezone GUC guard as a non-fatal WARNING — matches the QA recommendation tone (fail-fast was reconsidered as fail-soft to avoid blocking unrelated migrations on a runtime concern, which is the correct architectural call). TEST-001: docs/poc/7.6-self-healing-smoke.md now contains a full 9-step local execution guide (Supabase CLI + psql) with sign-off block, closing the "no reproducible-locally path" gap. AC9 staging smoke E2E remains deferred (doc-only is acceptable for Wave A per gate scope). Tests: 455/455 PASS (no regression; +23 from baseline 432 across the project, consistent with concurrent Epic 7 work). Verdict upgraded to PASS.'
