schema: 1
story: '7.6'
gate: CONCERNS
status_reason: 'All 11 ACs implemented offline with correct single-ownership of pg_cron schedules (AC1) and fn_mark_stale_runs (AC2 — defined only in migration 013, with 009 reduced to consumer comments). Boundary contract classify-anuncio (AC6) is exact: Wave A returns `source: deterministic_v1` with null fields; 12/12 contract tests PASS; OpenAPI 3.1 spec authoritative; pure-logic mirror in app/src/lib/edge-contracts/ keeps Edge Function testable from vitest. pgmq Path A adoption is gated by @data-engineer PoC (AC11 satisfied). Gate is CONCERNS — not PASS — because: (1) pgmq extension is not VERSION-pinned in migration 013 despite PoC recommending `VERSION 1.5.1`; (2) v_crawl_health view inherits crawl_runs RLS without explicit security model declaration, creating a dashboard observability blind spot for non-service-role consumers; (3) cron jobs rely on `current_setting(app.service_role_key, true)` and `app.edge_function_base_url` that must be wired by @devops at deploy — if unset, cron fires silently against empty URL; (4) AC9 smoke E2E remains doc-only, gated on @devops staging push. None of these are correctness defects in the offline artifacts — they are runtime/deploy concerns that @devops must address before close-story.'
reviewer: 'Quinn'
updated: '2026-05-18T02:30:00Z'

top_issues:
  - id: 'INFRA-001'
    severity: medium
    finding: 'Migration 013 does `CREATE EXTENSION IF NOT EXISTS pgmq;` without VERSION clause. PoC 7.6-pgmq-availability-check.md explicitly recommends `VERSION ''1.5.1''` to lock the contract surface (`pgmq.send`, `pgmq.create`, `pgmq.read`). Supabase platform updates can move default_version forward and break the queue API silently.'
    suggested_action: '@devops: change line 36 to `CREATE EXTENSION IF NOT EXISTS pgmq VERSION ''1.5.1'';`. Same for pg_cron in migration 012 (line 25 → `VERSION ''1.6.4''`). Pre-deploy validation: `SELECT extversion FROM pg_extension WHERE extname IN (''pgmq'',''pg_cron'');` must match pinned versions.'
  - id: 'SEC-001'
    severity: medium
    finding: 'View v_crawl_health (migration 013, lines 147-168) does not declare SECURITY INVOKER nor SECURITY DEFINER. Default Postgres behavior is invoker-rights for views, meaning RLS on crawl_runs (service_role + authenticated per Story 7.2/7.5 pattern) propagates. An `authenticated` operator (e.g., Luciana) querying the dashboard view through PostgREST will get an empty result set rather than a meaningful denial — observability blind spot.'
    suggested_action: 'Either (a) add `WITH (security_invoker=true)` and a permissive RLS read policy on crawl_runs for the dashboard role, OR (b) wrap as SECURITY DEFINER function (CREATE OR REPLACE FUNCTION fn_crawl_health() RETURNS TABLE ...). Recommend (b) for explicit auditability. Document the chosen path in next session.'
  - id: 'INFRA-002'
    severity: medium
    finding: 'Cron schedules in migration 012 depend on `current_setting(''app.service_role_key'', true)` and `current_setting(''app.edge_function_base_url'', true)`. The `true` flag (missing_ok) means if these GUC settings are not wired by @devops at deploy, cron jobs will fire HTTP POSTs against an empty URL with no auth header — silent failure logged only in cron.job_run_details.'
    suggested_action: '@devops: (1) wire both settings via `ALTER DATABASE postgres SET app.service_role_key = ...; ALTER DATABASE postgres SET app.edge_function_base_url = ...;` as part of staging deploy script; (2) add a smoke check post-deploy: `SELECT current_setting(''app.service_role_key'', true) IS NOT NULL;`. Consider follow-up story to fail-fast inside each cron body if setting is empty.'
  - id: 'TEST-001'
    severity: medium
    finding: 'AC9 smoke E2E is documented (docs/poc/7.6-self-healing-smoke.md) but not executed against staging. Self-healing loop (stale → failed → retry x3 → terminal failed) has no live evidence yet. Risk that retry cap interaction with `finished_at > NOW() - INTERVAL ''2 hours''` window in fn_retry_failed_runs produces unexpected boundary behavior under real load.'
    suggested_action: '@devops to execute the 5-step procedure in 7.6-self-healing-smoke.md on staging after applying 012+013. Capture raw output in a "Sign-off" section at the bottom of that PoC. Story must not transition to Done until smoke pass is recorded.'
  - id: 'CODE-001'
    severity: low
    finding: 'fn_retry_failed_runs (013, line 113) calls `pgmq.send` but the message is enqueued before `retry_count` is incremented on the same run. If the async worker picks up the message and re-creates the run before this transaction commits (cross-tx visibility), the worker may see retry_count one less than expected. In practice pgmq uses the same DB so MVCC isolates it, but the ordering is fragile.'
    suggested_action: 'Reorder: UPDATE retry_count first, then pgmq.send with the freshly-incremented value. Or use a CTE: `WITH bumped AS (UPDATE ... RETURNING retry_count) INSERT INTO pgmq.q ... FROM bumped`. Cosmetic — not a correctness defect in PostgreSQL''s default READ COMMITTED.'
  - id: 'CODE-002'
    severity: low
    finding: 'v_crawl_health view does not include `apify_cost_usd` from scraped_listings — AC10 mentions cost as desirable. Story explicitly defers this (comment lines 173-174) to avoid coupling to 7.3/7.4-owned schemas. Acceptable scope reduction but should be tracked.'
    suggested_action: 'Create follow-up story or backlog item: "extend v_crawl_health to include 24h total Apify cost per portal once scraped_listings join is stable". Reference in story 7.6 close note.'
  - id: 'DOCS-001'
    severity: low
    finding: 'Migration 012 header comment (line 4) says "Depends on: 013" but in filesystem order 012 runs BEFORE 013 by timestamp (20260514000005 < 20260514000006). The note explains the cron body resolves functions lazily at job execution. Reader confusion risk — "depends on" semantics inverted from intuition.'
    suggested_action: 'Reword comment to: "Runtime depends on 013 (functions are resolved at cron tick, not at migration apply time)". Cosmetic.'
  - id: 'DOCS-002'
    severity: low
    finding: '`supabase/functions/_shared/run-lifecycle.ts` created but NOT consumed by any Edge Function yet (per Dev Decisions item 5). Story 7.4 trigger/webhook still inline. Dead code until a refactor story lands.'
    suggested_action: 'Acceptable — Dev correctly respected 7.4 file ownership. Track as IDS REUSE candidate for the next Edge Function migration. Add backlog item: "refactor 7.4 trigger_mercadolivre_crawl + webhook_mercadolivre_done to consume _shared/run-lifecycle.ts".'

