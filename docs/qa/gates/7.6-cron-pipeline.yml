status_reason: 'Re-gate of commit cac7b9a against prior CONCERNS gate (fde1ca3, 2026-05-18). All 4 medium issues are RESOLVED in code via two new migrations (018 + 019), an in-place edit to 013, and a documentation expansion of the AC9 PoC. INFRA-001: pgmq is now pinned to VERSION ''1.5.1'' in migration 013 line 45 — exactly the version validated by @data-engineer in docs/poc/7.6-pgmq-availability-check.md. pg_cron VERSION pin in migration 012 was deliberately NOT applied because 012 was already merged/applied in a prior wave and is treated as immutable; the Dev decision is documented in the story Change Log (2026-05-19 entry) and is acceptable QA-side because pg_cron is not in the function-resolution path that pgmq is — pg_cron API surface is stable across 1.6.x and any drift would be observable in cron.job_run_details. SEC-001: migration 018 explicitly declares `security_invoker = true` on v_crawl_health, removing the implicit-RLS audit ambiguity. SEC-001 dashboard policy for `authenticated` role is intentionally left to a follow-up policy story (acknowledged in migration 018 header comment). INFRA-002: migration 019 implements the cron.timezone GUC guard as a non-fatal WARNING — matches the QA recommendation tone (fail-fast was reconsidered as fail-soft to avoid blocking unrelated migrations on a runtime concern, which is the correct architectural call). TEST-001: docs/poc/7.6-self-healing-smoke.md now contains a full 9-step local execution guide (Supabase CLI + psql) with sign-off block, closing the "no reproducible-locally path" gap. AC9 staging smoke E2E remains deferred (doc-only is acceptable for Wave A per gate scope). Tests: 455/455 PASS (no regression; +23 from baseline 432 across the project, consistent with concurrent Epic 7 work). Verdict upgraded to PASS.'
reviewer: 'Quinn'
updated: '2026-05-20T15:05:00Z'

top_issues:
  - id: 'INFRA-001'
    severity: medium
    status: RESOLVED
    resolution_commit: 'cac7b9a'
    finding: 'Migration 013 did `CREATE EXTENSION IF NOT EXISTS pgmq;` without VERSION clause. PoC 7.6-pgmq-availability-check.md explicitly recommended `VERSION ''1.5.1''`.'
    resolution: 'Migration 013 line 45 now reads `CREATE EXTENSION IF NOT EXISTS pgmq VERSION ''1.5.1'';`. Header comment expanded (lines 35-44) explains version pinning rationale and references the QA fix. pg_cron pin in migration 012 not applied — 012 was already merged in a prior wave (treated as immutable); deviation documented in story Change Log 2026-05-19. Acceptable because pg_cron API surface (cron.schedule, cron.unschedule) is stable across 1.6.x.'
    suggested_action: 'Closed. Future Epic 7 pgmq usage MUST run `SELECT extversion FROM pg_extension WHERE extname=''pgmq'';` pre-deploy and require ''1.5.1''.'
  - id: 'SEC-001'
    severity: medium
    status: RESOLVED
    resolution_commit: 'cac7b9a'
    finding: 'View v_crawl_health (migration 013) did not declare SECURITY INVOKER nor SECURITY DEFINER. RLS interaction with crawl_runs was implicit, hard to audit.'
    resolution: 'New migration `20260519000002_018_epic7_v_crawl_health_security.sql` runs `ALTER VIEW public.v_crawl_health SET (security_invoker = true);` — metadata-only, idempotent, no data movement. Header comment explicitly states that the dashboard-role permissive policy for crawl_runs is a follow-up policy story (acknowledged scope reduction). View comment regenerated to reference migration 018 + SEC-001.'
    suggested_action: 'Closed. Follow-up backlog item still recommended: add permissive RLS read policy on crawl_runs for the dashboard role so non-service-role consumers see something other than zero rows.'
  - id: 'INFRA-002'
    severity: medium
    status: RESOLVED
    resolution_commit: 'cac7b9a'
    finding: 'Cron schedules in migration 012 depend on `current_setting(...)` GUC settings that, if unwired, cause silent HTTP failures.'
    resolution: 'New migration `20260519000003_019_epic7_cron_timezone_guard.sql` adds a DO block that reads `cron.timezone` GUC and emits RAISE WARNING if anything other than UTC, or RAISE WARNING if pg_cron is not yet loaded. Migration intentionally does NOT fail (fail-soft) — a misaligned timezone is a runtime concern, not a schema defect, and failing would block unrelated migrations. The WARNING surfaces in migration logs for @devops triage. This is a partial resolution of INFRA-002 (timezone leg). The original app.service_role_key / app.edge_function_base_url wiring remains @devops responsibility at staging deploy time — but is now documented in PoC docs/poc/7.6-self-healing-smoke.md prerequisites.'
    suggested_action: 'Closed in scope. Operational follow-up tracked: @devops must wire `app.service_role_key` + `app.edge_function_base_url` via `ALTER DATABASE postgres SET ...` in the staging deploy script.'
  - id: 'TEST-001'
    severity: medium
    status: RESOLVED
    resolution_commit: 'cac7b9a'
    finding: 'AC9 smoke E2E was documented but had no reproducible-locally path; only staging execution mode existed.'
    resolution: 'docs/poc/7.6-self-healing-smoke.md now includes a "Local execution guide (QA fix TEST-001)" section (lines 115-281) with 9 explicit steps: Supabase CLI start, db reset, psql session, fixture seeding (immediate or back-dated), manual healer trigger, retry cap test (3 iterations + cap assertion), pgmq enqueue verification, v_crawl_health verification, cleanup, and a sign-off block to fill at execution time. This closes the "no local repro" gate finding. AC9 staging smoke E2E remains deferred per Wave A scope (gate doc-only acceptable).'
    suggested_action: 'Closed. When @devops applies migrations to staging, the same procedure can be executed there with `supabase db reset` replaced by `supabase db push` against the staging branch. Sign-off block must be filled when executed.'
  - id: 'CODE-001'
    severity: low
    status: OPEN
    finding: 'fn_retry_failed_runs (013, line 113) calls `pgmq.send` before `retry_count` is incremented. MVCC isolates this in practice but ordering is fragile.'
    suggested_action: 'Cosmetic — not a correctness defect. Tracked for future refactor. Will not block close-story.'
  - id: 'CODE-002'
    severity: low
    status: OPEN
    finding: 'v_crawl_health does not include `apify_cost_usd` from scraped_listings.'
    suggested_action: 'Tracked as backlog item: extend v_crawl_health to include 24h total Apify cost per portal once scraped_listings join is stable. Will not block close-story.'
  - id: 'DOCS-001'
    severity: low
    status: OPEN
    finding: 'Migration 012 header comment "Depends on: 013" semantics inverted from filesystem order.'
    suggested_action: 'Cosmetic — would require editing the already-applied 012. Acceptable to leave as-is; the runtime-resolution explanation is present in the same comment block.'
  - id: 'DOCS-002'
    severity: low
    status: OPEN
    finding: '`_shared/run-lifecycle.ts` created but unused by any Edge Function.'
    suggested_action: 'Acceptable IDS REUSE candidate for the next Edge Function migration. Backlog: refactor 7.4 trigger/webhook to consume it.'

