issues:
  - severity: medium
    category: code
    description: >
      Os logos PNG embutidos (REMAX_BALLOON_PNG/REMAX_WORDMARK_PNG) não são embutidos
      de forma confiável pelo React-PDF: no render node geram stream zlib corrompido
      ("incorrect header check") e não aparecem (wordmark = caixa fantasma; balão = quadro
      vazio). O DECK foi corrigido para branding VETORIAL (renderiza em browser e node).
      Resumo/Laudo/Didático ainda usam o logo raster.
    recommendation: >
      Extrair o lockup vetorial (`RemaxBars` + wordmark) para um módulo compartilhado e
      aplicá-lo aos 4 documentos; verificar no browser (toBlob) se o raster realmente
      falha lá antes de descartar os PNGs. Fast-follow não-bloqueante.
  - severity: low
    category: requirements
    description: >
