storyId: STORY-8.7
verdict: CONCERNS
verdictReason: >
  Polish dos entregáveis ACM: branding oficial RE/MAX, cabeçalho redesenhado e
  integridade de dados (Art. IV — dorms/suítes/vagas e links de anúncio só quando
  confirmados no DB, nunca inventados). AC1–AC8 atendidos (validação real abaixo).
  Destaque AC7: bug de PRODUÇÃO na RPC `fn_comparaveis_no_raio` (referência a
  `ac.ano_referencia` inexistente) encontrado e corrigido na migration, já APLICADA
  em PROD. Novo `comparavelAdapter.ts` centraliza o mapeamento RPC→source (antes
  duplicado em 3 sheets) + pins coloridos do mapa. Aprovado com observações
  (nenhuma bloqueante): (1) DURANTE esta sessão descobriu-se que os logos PNG
  embutidos (balão/wordmark) NÃO embutem de forma confiável pelo pipeline de imagem
  do React-PDF (geram stream zlib corrompido no render node; comportamento no browser
  não verificado nesta sessão) — o DECK foi endurecido para branding VETORIAL (barras
  RE/MAX + wordmark tipográfico), que renderiza idêntico e crisp em browser e node;
  recomenda-se estender o mesmo lockup aos outros 3 docs (Resumo/Laudo/Didático), que
  seguem usando o logo raster; (2) migration staged + tipos TS editados à mão —
  @data-engineer validar colunas e regenerar tipos; (3) textos institucionais/
  qualitativos seguem seeds Honduras (herdado de 8.3b/8.4) — revisar por caso.
  Status InReview → Done autorizado.

