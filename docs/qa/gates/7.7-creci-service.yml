issues:
  - severity: low
    category: code
    description: |
      Em CreciService.lookup, quando BudgetExceededError/CircuitOpenError
      ocorre, retorna null SEM persistir miss no cache. Significa que
      proxima chamada para mesmo numero/uf tentara budget guard novamente.
      Comportamento correto para budget (transitorio, queremos retry quando
      orcamento recompoe), mas para circuit-open ideal seria short-TTL
      negative cache.
    recommendation: |
      Wave B: considerar negative cache TTL diferenciado por error_code
      (budget=NULL=no-cache; circuit=5min; crecisp_unavailable=24h;
      conselho_not_found=30d).
    blocking: false
  - severity: low
    category: code
    description: |
      Negative cache TTL fixo em 30d para todos error_codes inclusive
      'crecisp_unavailable' — pode mascarar volta do servico CRECI SP
      durante 30 dias. Dev Agent Record menciona "operacao manual reset".
    recommendation: |
      Wave B: separar TTL por tipo (crecisp_unavailable=24h-7d para
      detectar recuperacao do servico server-side).
    blocking: false
  - severity: low
    category: tests
    description: |
      AC11 perf bench eh doc-only. Sem evidencia empirica que P50 cache
      hit < 30ms / miss < 8s em prod.
    recommendation: |
      @devops + @qa: executar PoC em staging pos-deploy com Luciana
      fornecendo 5 CRECIs conhecidos em 3 UFs. Coletar p50/p95.
      Custo estimado: 5-15 solves * $0.008 = ~$0.12.
    blocking: false
  - severity: low
    category: code
    description: |
      captcha_spend persiste in-memory no CaptchaBudgetGuard (sem tabela
      DB). AC8 menciona tabela mas implementacao usa CaptchaSpendStore
      interface — qualquer reinicio do processo zera o spent. Para
      Wave A com baixo volume isso eh aceitavel, mas pode permitir
      bypass do budget em deploys frequentes.
    recommendation: |
      Wave B: criar tabela captcha_spend (date, cost_brl) + adapter
      SupabaseCaptchaSpendStore. Tech-debt ja anotado no story.
    blocking: false
  - severity: info
    category: requirements
    description: |
      CRECI SP retorna null + error_code='crecisp_unavailable' por
      design (BR-CRECISP-001). Luciana precisa ser comunicada que
      SP-only lookups Wave A vao falhar silenciosamente (null com error).
    recommendation: |
      UI Story 7.9 deve exibir badge "Validacao CRECI SP temporariamente
      indisponivel" quando classifyAdvertiser receber null+crecisp_unavailable.
    blocking: false

