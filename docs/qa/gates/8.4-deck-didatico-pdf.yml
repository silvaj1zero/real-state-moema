issues:
  - severity: medium
    category: requirements
    description: >
      O conteúdo institucional do deck (diferenciais, plano de marketing, garantia,
      próximos passos) e o texto explicativo do didático são templates seed derivados do
      caso/deck Honduras. Tracem à referência (Art. IV) e interpolam os números computados,
      mas são SEEDS — não material comercial final por imóvel.
    recommendation: >
      A consultora deve revisar/sobrescrever via DeckInput/DidaticoInput antes de
      apresentar ao proprietário (todos os campos são overridable). Considerar expor os
      campos-chave no sheet numa fase seguinte.
  - severity: low
    category: requirements
    description: >
      As estatísticas RE/MAX (115+ países, 144 mil corretores, R$ 14,3 bi VGV etc.) são
      constantes institucionais hardcoded do deck v2 — envelhecem com o tempo.
    recommendation: >
      Centralizar em um único módulo institucional e atualizar por fonte oficial RE/MAX a
      cada ciclo; já são overridable por DeckInput.remaxMundo/remaxBrasil.
  - severity: low
    category: code
    status: INHERITED
    description: >
      Mapa não plota pins dos comparáveis (Top N) e logo é tipográfico — herdado da 8.3
      (RPC fn_comparaveis_no_raio sem lat/lng; asset PNG ausente).
    recommendation: >
      @data-engineer: lat/lng na RPC (fecha pins de 8.3a/8.3b/8.4); asset: logo oficial PNG.

