storyId: STORY-8.4
verdict: CONCERNS
verdictReason: >
  Deck Comercial RE/MAX (paisagem, 20 slides) e Material Didático (retrato, 5 partes)
  implementados em PDF nativo React-PDF, fiéis ao `ACM_Apresentacao_Completa_Honduras_
  RE-MAX_v2.pdf` e ao `MATERIAL_DIDATICO_ACM_Honduras.pdf` (texto-fonte extraído via
  `pdftotext -layout` — Art. IV). Ambos derivam do MESMO `AcmLaudoComputation` (8.2) e
  do mesmo `LaudoSourceComparable` do laudo (8.3b) — consistência total de números
  testada (AC3). Reusa os primitivos da 8.3 (theme.ts/staticMap.ts) sem segunda stack
  de PDF. O Didático explica a fórmula de aderência a partir dos pesos REAIS da
  metodologia (`ADHERENCE_WEIGHTS`) — a fórmula explicada é a executada. AC1–AC6
  atendidos. Aprovado com observações (nenhuma bloqueante): (1) o conteúdo institucional/
  explicativo é template seed do caso Honduras — revisar/sobrescrever por caso antes da
  entrega; (2) as estatísticas RE/MAX (mundo/Brasil) são constantes institucionais do
  deck v2 — atualizar por fonte oficial periodicamente; (3) pins de comparáveis no mapa
  e logo PNG herdados da 8.3 (limitações conhecidas). Status InReview → Done autorizado.

