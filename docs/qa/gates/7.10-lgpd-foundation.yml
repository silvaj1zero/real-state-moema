storyId: STORY-7.10
verdict: WAIVED
verdictReason: >
  Verdict moved from CONCERNS -> WAIVED on 2026-05-24 by founder decision
  (ADR-EPIC7-MVP-LOCAL-WAIVER). AC1 (LIA counsel signature) is WAIVED for
  MVP-LOCAL scope only: single end-user (Luciana Borba), local server, no
  public IP, no external data sharing. The LGPD obligations themselves are
  NOT waived; implemented controls (vault, audit, opt-out, anonymize)
  continue in force. Code/test/security layers PASS with high confidence;
  cross-story concerns (scraped_listings plaintext PII coupling, retention
  cron unscheduled) remain tracked for follow-up. Production / cloud / multi-
  user deploys remain blocked and require waiver re-evaluation per the
  triggers in the ADR.

  Re-gate 2026-05-24 by Quinn (@qa): WAIVED verdict held; AC11 (PoC Vault
  real execution) re-evaluated under MVP-LOCAL — Vault wrappers are
  functional in dev (39 unit tests PASS), the documented smoke spec
  (docs/poc/7.10-lgpd-smoke.md, 302 lines) describes the full 6-step path,
  and a real production-Vault smoke is acceptable as DEFERRED-TO-ACTIVATION
  because no production deploy is in scope for MVP-LOCAL. Any constraint-3
  trigger (cloud, multi-user, >100 leads/mo, public endpoint) auto-voids
  the waiver and reinstates AC11 real execution + AC1 counsel signature as
  hard prerequisites before resuming ingestion. Story Status authorized to
  move InReview -> Done.

