storyId: STORY-8.2
verdict: CONCERNS
verdictReason: >
  Camada de cálculo ACM (lib pura `methodology.ts`) reproduz fielmente a
  metodologia do laudo Honduras e está travada por testes de regressão
  determinísticos. AC1, AC2, AC3, AC5, AC6 PASS com alta confiança. AC4
  (exibição na UI) foi PARCIALMENTE atendido por um DESVIO deliberado de
  realização: em vez de estender `AcmSummaryCards`/`AcmTable` com Score +
  índice por linha, foi adicionado um painel dedicado `AcmSimilarPanel`
  ("Comparáveis mais parecidos") que expõe o índice de aderência + valor
  indicativo e foi validado AO VIVO com a end-user (Luciana, 113 m² Rua
  Alvorada → ~R$ 1,25M). O **Score** não é exibido em lugar nenhum da UI —
  decisão correta sob o estado atual: os comparáveis ITBI ainda não trazem
  programa (suítes/vagas/dorms), então `classifyScore` rodaria sobre proxy de
  área e produziria Score de baixa confiança. Score-na-UI fica DEFERIDO até o
  sink do engine entregar programa (Story 8.1 AC3). Sem bloqueio de merge:
  lib correta, regressão verde, 0 regressões. Recomenda-se @po reconciliar o
  texto do AC4 com a realização em painel OU manter AC4 aberto para a iteração
  de Score pós-sink. Story autorizada InReview -> Done (código já commitado e
  no remoto).

