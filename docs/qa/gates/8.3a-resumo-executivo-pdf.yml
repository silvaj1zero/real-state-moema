issues:
  - severity: medium
    category: code
    status: RESOLVED
    description: >
      Robustez do mapa: com token presente, o React-PDF busca a imagem Mapbox
      durante o render do PDF. Se esse fetch falhar (offline, rate-limit, 4xx),
      `pdf().toBlob()` rejeita e o Resumo inteiro não gera. O try/catch do
      ResumoExportSheet evita crash e exibe erro, mas o usuário perde o PDF por
      uma falha transitória do mapa. Os smokes cobrem só o caminho mapaUrl=null.
    recommendation: >
      Pré-buscar a imagem do mapa no ResumoExportSheet (fetch → ok? mantém URL :
      mapaUrl=null) ANTES de montar o modelo, degradando para "sem mapa" em vez
      de abortar. Adicionar teste do caminho de falha de fetch.
    resolution: >
      RESOLVIDO pós-gate (@dev, 2026-06-16): `resolveStaticMapImage(url, deps)`
      pré-busca a imagem e a embute como data URL; retorna null em QUALQUER falha
      (sem token / !ok / throw / erro de leitura) → degrada para "sem mapa", nunca
      aborta. Bônus: o token Mapbox deixa de chegar ao PDF (usado só no pré-fetch).
      +4 testes (null, ok, !ok, throw). pdf suite 32 → 36; ACM 76 → 80.
  - severity: low
    category: requirements
    description: >
      AC5 parcial — logo RE/MAX é lockup tipográfico; o balão oficial em PNG não
      está no repo. Cores/CRECI/rodapé/tipografia OK.
    recommendation: >
      Dropar o asset oficial em `public/` e trocar o lockup por <Image> quando a
      consultora/franquia fornecer o logo aprovado (regras de uso no brand-guide).
  - severity: low
    category: requirements
    description: >
      Mapa não plota pins dos comparáveis (Top N) — a RPC fn_comparaveis_no_raio
      retorna apenas distancia_m, sem lat/lng.
    recommendation: >
      @data-engineer estender a RPC com lat/lng (geometry) para habilitar os pins
      ❶❷❸/★ do Top N no mapa, fechando 100% a paridade visual com a referência.
  - severity: low
    category: code
    description: >
      Tipografia usa Helvetica nativa (não Montserrat/Inter do brand-guide).
      Decisão deliberada p/ offline-safety; registerBrandFonts() já existe.
    recommendation: >
      Vendorizar Montserrat/Inter TTF em `public/fonts/` e chamar
      registerBrandFonts() no ponto de geração para fidelidade tipográfica plena.
  - severity: low
    category: code
    description: >
      Cast duplo `as unknown as AcmRpcRow[]` em ResumoExportSheet (mesmo padrão
      da 8.2/AcmSimilarPanel).
    recommendation: >
      Limpar após regen de tipos (8.1 AC6) com mapeamento tipado explícito.

