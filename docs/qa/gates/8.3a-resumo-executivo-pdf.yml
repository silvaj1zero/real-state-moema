storyId: STORY-8.3a
verdict: CONCERNS
verdictReason: >
  Resumo Executivo ACM (PDF nativo React-PDF) implementado de ponta a ponta e
  fiel à referência `ACM_RESUMO_Honduras_RE-MAX.pdf` (3 páginas). A camada de
  render consome o `AcmLaudoComputation` (8.2) sem recálculo (ADR-EPIC8-001) e
  separa view-model puro (`buildResumoModel`) de render (`ResumoDocument`),
  permitindo testes sem gerar PDF + 2 smokes reais via `renderToBuffer` (assina
  `%PDF-`). AC1–AC4, AC6–AC8 PASS. Dois pontos de atenção, nenhum bloqueante:
  (1) **AC5 PARTIAL** — branding correto em cores/CRECI/rodapé, mas o logo é um
  lockup TIPOGRÁFICO (RE/[MAX]/GALERIA), não o balão RE/MAX oficial em PNG (asset
  ausente no repo). (2) **Robustez do mapa** — o fallback testado cobre "sem
  token → null → placeholder", mas com token presente o React-PDF busca a imagem
  Mapbox DURANTE o render; se o fetch falhar (offline/rate-limit) o `toBlob()`
  rejeita e ABORTA o PDF inteiro (o try/catch do sheet evita crash e mostra erro,
  mas não degrada para "sem mapa"). Recomenda-se pré-buscar o mapa e cair para
  `mapaUrl=null` em falha, garantindo que o PDF sempre gere. Aprovado com
  observações; Status InReview → Done autorizado (commit/push pendente @devops).

