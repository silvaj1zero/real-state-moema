files_reviewed:
  - 'scripts/epic7/build-validation-batch.sql'
  - 'supabase/migrations/20260524000001_020_epic7_validation_batch.sql'
  - 'app/src/app/admin/validation-workshop/page.tsx'
  - 'app/src/app/admin/validation-workshop/actions.ts'
