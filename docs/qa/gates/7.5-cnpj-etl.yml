fixes_verified:
  AC6_workflow_activation:
    file: '.github/workflows/cnpj-etl-monthly.yml'
    finding: 'Header comment carries the 5-step activation runbook (upstream materialized, runner provisioned, 4 secrets set, PoC done, then flip CNPJ_ETL_ENABLED=true). Job guard `if: ${{ secrets.CNPJ_ETL_ENABLED == ''true'' }}` correctly inverts the default — secret unset or any other value keeps the workflow inert. Schedule cron `0 2 20 * *` + `workflow_dispatch` trigger preserved. `permissions: contents: read` correctly limits the token. `timeout-minutes: 240` matches AC7 4h alert threshold. `runs-on: self-hosted` aligned with story technical notes.'
    verdict: PASS
  AC7_telemetry_emission:
    file: 'scripts/epic7/cnpj-emit-telemetry.sh'
    finding: 'Bash script with `set -euo pipefail`, explicit `require()` env-var guard, three branches (running INSERT → emits run_id on stdout + GITHUB_OUTPUT; completed PATCH; failed PATCH with error_message). Uses Supabase REST API + service_role JWT. jq dependency avoided via sed parse — acceptable for the single id field. Workflow wires 3 steps: telemetry_open (id=telemetry_open), telemetry close (if: success()), telemetry close (if: failure()), each receiving env vars for status/portal/run_id. JSON body building escapes double-quotes in error_message (`${ERROR_MSG//\"/\\\"}`) — robust enough for typical failure strings; not a full JSON escaper but defensive for the controlled error strings the workflow emits.'
    verdict: PASS
  AC9_backup_helper:
    file: 'infrastructure/cnpj-etl/backup_to_storage.sh'
    finding: '`pg_dump --no-owner --no-privileges --table=public.cnpj_enrichment` piped through `gzip -9` into `mktemp -d` workdir cleaned by `trap EXIT`. Upload via curl POST first → fallback to PUT (overwrite) on 409/400. Distinct exit codes (2 missing env, 4 upload failed). Pairs cleanly with restore_cnpj_db.sh. Lifecycle (12-month retention) handled by quarterly manual review per runbook (see infra_prerequisites below) instead of automation — explicit MVP-LOCAL waiver alignment.'
    verdict: PASS

