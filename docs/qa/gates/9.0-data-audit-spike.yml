  real foi obtida sem inventar coordenadas (AC4 — geocode real de Moema + RPC),
  o documento de achados foi entregue (AC5) e nenhuma alteração de schema/dado
  ocorreu (AC6). Sem código de produção → sem testes unitários aplicáveis; a
  "prova" é a query empírica documentada. Aprovado para Done (commit/push
  pendente @devops).

