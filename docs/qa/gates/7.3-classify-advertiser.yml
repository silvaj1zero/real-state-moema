  - id: 'PERF-001'
    severity: low
    finding: 'Cache CNAE e modulo-level (Map global). Em multi-tenant SSR sem reset, cache vaza entre requests teoricamente. Nao e issue real porque dados CNAE sao globais (CNPJ -> CNAE e publico/imutavel).'
    suggested_action: 'N/A — cache global e correto para dados imutaveis. Documentar em Wave B caso migracao para Redis.'
  - id: 'MNT-002'
    severity: low
    finding: 'Regex nameAppearsPersonal aceita "Joao da Silva" mas particles set usa lowercase apenas (`da`, `de`, `do`, `das`, `dos`, `e`). Particle "E" capitalizada (raro em nomes pt-BR) cairia no regex alfabetico normal e passaria.'
    suggested_action: 'Edge nao critico; nenhuma producao real usa "E" capitalizado como particle. Story 7.9 (Luciana validation) capturara qualquer falso positivo. Nao bloqueia.'

