storyId: STORY-9.2
verdict: CONCERNS
verdictReason: >
  Planilha XLSX canônica multi-aba entregue em TS nativo (exceljs), fechando a
  maior lacuna da comparação 1:1 (antes só CSV plano). Modelo puro
  (`planilhaModel.ts`) separado do writer (`buildPlanilhaWorkbook.ts`), com as 7
  abas (Leia-me · Top 3/5/10 · Todos · Ofertas ativas · Terrenos), estilos da
  referência (fill por faixa, cabeçalho navy, hyperlink, freeze, auto-filter) e
  degradação graciosa validada por teste (campos 100% NULL → células vazias;
  abas sem dado → "Nenhum registro no raio"). AC1/AC3/AC4/AC6/AC7/AC8 PASS.
  CONCERNS por AC2 PARCIAL (desvio honesto): 18 colunas em vez das 21 da
  referência — `Bairro`, `Programa:origem` e `Re-verif./Confere` foram omitidos
  por não existirem no dado da RPC hoje; entram quando 9.4 (sink) / 9.5
  (validação web) os popularem. Sem bloqueio de merge: 132/132 testes ACM, 0
  tsc, 0 lint. Aprovado com observações.

