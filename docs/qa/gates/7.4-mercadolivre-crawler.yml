quality_review_findings:
  architecture:
    score: PASS
    notes: 'Separacao limpa shared/app vs actor isolado (ADR-EPIC7-006) — parsers em app/src/lib/scrapers/mercadolivre/, sync-script copia para src/shared/ no build. Permite unit tests no contexto Next.js + isolamento producao Apify. Edge Functions trigger/webhook desacopladas, idempotencia documentada.'
  parsers:
    score: PASS
    notes: 'JSON-LD primeiro (mais estavel que selector CSS), DOM fallback bem estruturado (cascata de selectors + regex). CRECI/CNPJ regex razoaveis. Telefone PHONE_RE aceita mascarado (correto Wave A). Pureza TS (sem next/* imports) verificavel.'
  edge_functions:
    score: CONCERNS
    notes: 'trigger: 202 fast-path OK mas falta auth (SEC-002) e nao valida body shape antes do dispatch. webhook: idempotency via SELECT-then-UPDATE corretamente; auth via shared-token simples ao inves de HMAC (SEC-001).'
  error_handling:
    score: PASS
    notes: 'Try/catch no crawler.run com telemetry.finishRun(failed) + Actor.exit no finally. lookupCNAE falha graceful (cnae=undefined). persistListing/updateClassification logam erro mas nao abortam run. Dry-run quando creds ausentes.'
  rate_limit_compliance:
    score: CONCERNS
    notes: 'maxRequestsPerMinute=60 + retries=2 OK. Mas: respeita robots.txt + fingerprint rotation + session pool dependem 100% de portal-crawler.ts (Story 7.2) — assumido OK por Story 7.2 PASS. Tolerancia 200-OK >=85% (AC6) so validavel em PoC real (OBS-001).'
  lgpd_compliance:
    score: FAIL
    notes: 'BLOCKER (BLOCK-001): captura telefone_anunciante/nome_anunciante PF persistido em scraped_listings sem cifragem em repouso (Story 7.10 ainda nao Done). Implementacao tecnica nao tem culpa — gate eh organizacional. Deploy producao BLOCKED ate 7.10.'
  test_coverage:
    score: CONCERNS
    notes: '38 tests cobrem parsers determinsticos com 4 fixtures sinteticas (listing-moema, detail-fisbo, detail-creci, detail-cnpj). Cobertura logica solida. Falta: fixtures reais ML producao (TEST-001) + integration tests Edge Functions (Deno test) + E2E real (OBS-001).'
  documentation:
    score: PASS
    notes: 'docs/poc/7.4-mercadolivre-smoke.md runbook completo (pre-requisitos, procedure, validation queries, rollback). Story File List preciso, Change Log rastreavel. Decisoes documentadas em Dev Agent Record.'

