reGate:
  date: '2026-05-19'
  reviewer: '@qa (Quinn)'
  commit_reviewed: d7fe33f
  previousVerdict: CONCERNS
  newVerdict: CONCERNS
  newVerdictReason: 'Tres fixes (LOGIC-001/SEC-001/SEC-002) RESOLVED com qualidade — modulo dedicado cap-per-bairro.ts + HMAC-SHA256 via Web Crypto + trigger shared-secret fail-closed. Tests 432 -> 455 (+23) verdes. Verdict mantem CONCERNS por blockers externos (BLOCK-001 LGPD counsel 7.10 + OBS-001 PoC staging real). Esses sao organizacionais, nao de codigo.'
  fixesValidated:
    LOGIC-001:
      status: RESOLVED
      notes: 'Modulo dedicado app/src/lib/scrapers/mercadolivre/cap-per-bairro.ts com 5 helpers puros (extractBairroFromUrl, shouldStopBairro, clampDetailsToCap, nextBairroCount, shouldEnqueueNextPage). main.ts seeds userData.bairro/bairroCount no enqueue inicial + propaga count incrementado por detail + gating de next-page via shouldEnqueueNextPage. 12 tests (boundary, pagination, isolation entre bairros). Bug do contador global eliminado — cada bairro chega ao cap independentemente.'
    SEC-001:
      status: RESOLVED
      notes: 'webhook_mercadolivre_done agora le body raw via req.text() ANTES de JSON.parse, valida x-webhook-signature via crypto.subtle.importKey/sign HMAC-SHA256 (Web Crypto API, Deno-native), compara hex com timingSafeEqualHex (constant-time). Trigger envia _webhookKey: WEBHOOK_SECRET ao Apify p/ assinar body. Fail-closed (500) se WEBHOOK_SECRET unset, 401 se signature missing/invalid. 11 tests cross-validados contra Node crypto.createHmac + tamper detection.'
    SEC-002:
      status: RESOLVED
      notes: 'trigger_mercadolivre_crawl valida x-trigger-secret contra env MERCADOLIVRE_TRIGGER_SECRET ANTES de qualquer trabalho (insert crawl_runs, dispatch Apify). Fail-closed 500 se env unset; 401 se header missing/mismatch. Migration 017 (20260519000001) reconfigura cron job epic7_mercadolivre_daily via cron.unschedule+cron.schedule p/ incluir header lendo do GUC app.mercadolivre_trigger_secret. PoC runbook atualizado com setup envvars.'
  remainingBlockers:
    - 'BLOCK-001 (Story 7.10 LGPD/LIA counsel) — external dependency; deploy producao permanece blocked'
    - 'OBS-001 (AC9 PoC real execution em staging) — @devops; Apify Actor deploy + run real 100 URLs'
  testEvidence:
    targeted: '23/23 passing (cap-per-bairro 12 + webhook-hmac 11)'
    full_suite: '455/455 passing (era 432; +23 sem regressao)'
    duration: '~29.4s vitest run completo'

top_issues:
  - id: 'BLOCK-001'
    severity: critical
    category: compliance
    ac: AC1-AC8
    status: RESOLVED-BY-WAIVER
    finding: 'DEPLOY GATE: Story 7.10 (LGPD Foundation — LIA counsel + cifragem + opt-out + audit log) ainda nao Done. Story 7.4 captura telefone_anunciante (PF mascarado) + nome_anunciante e persiste em scraped_listings. Sem LIA aprovada e cifragem em repouso, deploy producao = violacao LGPD.'
    suggested_action: 'NAO promover a producao ate Story 7.10 atingir Done. Implementacao + smoke staging permitidos com flag privacy-mock; producao bloqueada. Reforcar pre-push hook em @devops.'
    resolution: 'RESOLVED-BY-WAIVER 2026-05-24 — MVP-LOCAL-WAIVER (ADR-EPIC7-MVP-LOCAL-WAIVER). Single-user / local-server scope. Cloud/multi-user deploy permanece bloqueado per ADR triggers; LGPD obligations themselves remain in force (controles 7.10 ativos: vault, audit log, opt-out, anonymize).'
  - id: 'SEC-001'
    severity: medium
    category: security
    ac: AC8
    finding: 'webhook_mercadolivre_done valida secret via comparacao string simples em header x-webhook-secret (linhas 30-33). Story declara HMAC mas implementacao e shared-token. Vulneravel a timing attack + replay caso secret vaze em log/proxy.'
    suggested_action: 'Wave A aceitavel (Apify confiavel + HTTPS). Antes de prod: implementar HMAC-SHA256 sobre body com `crypto.subtle.timingSafeEqual` (ou equivalent Deno) e header `x-apify-webhook-signature`. Adicionar a TODO/Tech Debt da story.'
  - id: 'SEC-002'
    severity: medium
    category: security
    ac: AC8
    finding: 'trigger_mercadolivre_crawl nao valida autorizacao do caller (linha 42-46). Qualquer POST com env vars presentes dispara Apify run + cria crawl_runs row. Sem CORS, sem service-role check, sem rate-limit. Disparo abusivo = consumo CU Apify + crawl_runs lixo.'
    suggested_action: 'Adicionar verificacao Authorization Bearer com service-role key OU IP allowlist pg_cron source antes de dispatch. Documentar como TODO para Story 7.6 quando cron entrar.'
  - id: 'OBS-001'
    severity: medium
    category: requirements
    ac: AC9
    finding: 'AC9 (PoC 100 URLs reais, telemetria gravada, classify rodou, >=85% success rate) entregue como doc-only runbook. Fixtures sinteticas validam parsers mas nao validam: resiliencia anti-bot real, JSON-LD presente em ML producao, Cloudflare/DataDome detection, CU consumption real, browser-mode fallback.'
    suggested_action: 'Executar smoke staging real antes de promover Wave A. Manter status InReview ate execucao; PoC real deve gravar crawl_runs row + stats Apify em docs/poc/7.4-mercadolivre-smoke-results.md.'
  - id: 'LOGIC-001'
    severity: medium
    category: code
    ac: AC2
    finding: 'main.ts linha 206 — pagination check `detailsProcessed < input.max_listings_per_bairro` usa contador GLOBAL (acumulado de todos bairros), nao por-bairro. AC2 declara cap por bairro (default 500/bairro). Com 3 bairros x 2 tipos = 6 start URLs, cap global de 500 limita listagem do primeiro bairro processado, deixando outros sem paginacao.'
    suggested_action: 'Trocar para Map<bairro, count> com chave extraida de userData.bairro (atualmente userData carrega bairroCount=0 mas nunca eh incrementado). Add unit test cobrindo cap por bairro.'
  - id: 'LOGIC-002'
    severity: low
    category: code
    ac: AC4
    finding: 'persistListing (main.ts:82-105) usa upsert com classification=unknown na primeira insercao e UPDATE em seguida via updateClassification. Dois round-trips por listing (upsert + update). 500 listings = 1000 queries Supabase.'
    suggested_action: 'Aceitavel Wave A. Wave B: classificar ANTES de persist e gravar resultado final no upsert (1 query). Padrao atual e funcional mas duplica I/O.'
  - id: 'TEST-001'
    severity: low
    category: tests
    ac: AC10
    finding: 'Fixtures HTML sao sinteticas (construidas pelo dev a partir de entendimento da estrutura). Risco: se ML mudar selector ou estrutura JSON-LD em prod, parsers passam local + falham silencioso em runtime. Sem snapshot real ML, drift e invisivel.'
    suggested_action: 'Capturar 3 fixtures REAIS one-shot (via curl em IP staging, salvar em __fixtures__/mercadolivre/real-*.html.gz, gitignored se necessario por compliance). Adicionar tests rodando contra elas marked .skip por default, ativar em CI semanal.'
  - id: 'PERF-001'
    severity: low
    category: performance
    ac: AC6
    finding: 'createPortalCrawler override `maxRequestsPerMinute: 60` (main.ts:189). Wave A defensivo OK. Sem assertion sobre Crawlee `maxConcurrency` — default Crawlee pode usar concurrency alta que viola 1 req/s mesmo com rate cap.'
    suggested_action: 'Adicionar maxConcurrency:2 no override ou documentar que portal-crawler.ts ja seta. Verificar no Story 7.2 codebase. Smoke real (OBS-001) confirma comportamento empirico.'
  - id: 'MNT-001'
    severity: low
    category: code
    ac: AC1
    finding: 'main.ts:46-56 DEFAULT_INPUT.preco_max=0/area_max=0/quartos_min=0 usados como "sem teto" (per input_schema description) mas buildStartUrls nao filtra/incorpora filtros numericos nas URLs. Filtros do schema sao decorativos.'
    suggested_action: 'Wave A aceitavel (default = 3 bairros venda casa+apto). Wave B: implementar filtros via query-string ML (`?price=*-1000000`) ou chunking de preco mencionado em Technical Notes.'
  - id: 'MNT-002'
    severity: low
    category: code
    ac: AC2
    finding: 'main.ts linha 179 — start URL userData carrega bairroCount:0 mas nunca eh lido nem incrementado. Codigo morto (relacionado a LOGIC-001).'
    suggested_action: 'Remover ou usar conforme LOGIC-001 fix.'

